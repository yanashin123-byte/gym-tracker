<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食事記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: #1a1a1a;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  header h1 { font-size: 18px; font-weight: 700; }

  .header-btns { display: flex; gap: 8px; }

  .icon-btn {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: #aaa;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .date-nav button {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: #aaa;
    padding: 6px 12px;
    font-size: 16px;
    cursor: pointer;
  }

  .date-label {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  /* タンパク質サマリー */
  .protein-summary {
    background: #1a1a1a;
    margin: 16px;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .protein-label { font-size: 12px; color: #888; margin-bottom: 4px; }

  .protein-numbers {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    margin-bottom: 10px;
  }

  .protein-current { font-size: 42px; font-weight: 700; color: #4CAF50; }
  .protein-unit { font-size: 16px; color: #888; }
  .protein-target { font-size: 14px; color: #888; }

  .progress-bar {
    background: #2a2a2a;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #4CAF50, #8BC34A);
    transition: width 0.3s ease;
  }

  .progress-fill.over { background: linear-gradient(90deg, #FF9800, #F44336); }

  /* 食事セクション */
  .meal-section {
    margin: 0 16px 16px;
    background: #1a1a1a;
    border-radius: 14px;
    overflow: hidden;
  }

  .meal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #2a2a2a;
  }

  .meal-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
  }

  .meal-emoji { font-size: 18px; }

  .meal-protein {
    font-size: 13px;
    color: #4CAF50;
    font-weight: 600;
  }

  .add-food-btn {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: #aaa;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }

  .food-items { padding: 4px 0; }

  .food-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid #222;
  }

  .food-item:last-child { border-bottom: none; }

  .food-name { font-size: 14px; color: #ddd; flex: 1; }

  .food-detail {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .food-protein { font-size: 13px; color: #4CAF50; font-weight: 600; min-width: 40px; text-align: right; }
  .food-kcal { font-size: 12px; color: #666; min-width: 52px; text-align: right; }

  .delete-btn {
    background: none;
    border: none;
    color: #555;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 16px;
  }

  .empty-meal {
    padding: 12px 16px;
    font-size: 13px;
    color: #555;
    text-align: center;
  }

  /* よく使う食材 */
  .quick-section {
    margin: 0 16px 16px;
  }

  .quick-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .quick-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-item {
    background: #1a1a1a;
    border: none;
    border-radius: 10px;
    color: #ddd;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }

  .quick-item span { color: #4CAF50; font-size: 11px; display: block; margin-top: 2px; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: #1a1a1a;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    font-size: 12px;
    color: #888;
    display: block;
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: #2a2a2a;
    border: none;
    border-radius: 10px;
    color: #eee;
    padding: 12px 14px;
    font-size: 15px;
  }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .modal-btns { display: flex; gap: 12px; margin-top: 8px; }

  .btn-cancel {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 12px;
    color: #aaa;
    padding: 14px;
    font-size: 15px;
    cursor: pointer;
  }

  .btn-add {
    flex: 2;
    background: #4CAF50;
    border: none;
    border-radius: 12px;
    color: #fff;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .history-list { margin: 0 16px; }
  .history-day {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .history-day-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .history-day-date { color: #888; }
  .history-day-protein { color: #4CAF50; font-weight: 600; }

  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    padding: 8px 0 20px;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: #666;
    padding: 6px;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .tab-btn.active { color: #4CAF50; }
  .tab-btn .tab-icon { font-size: 20px; }

  /* ===== チェックリスト（サプリ表統合） ===== */
  #checkView .chk-mode-toggle { display:flex; background:#2a2a2a; border-radius:10px; padding:3px; margin:16px 16px 12px; }
  #checkView .chk-mode-btn { flex:1; padding:8px 0; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; background:transparent; color:#555; transition:all .2s; }
  #checkView .chk-mode-btn.active-gym  { background:#2a1060; color:#a78bfa; }
  #checkView .chk-mode-btn.active-rest { background:#0a2a10; color:#6ee7a0; }

  #checkView .chk-progress { margin:0 16px 4px; }
  #checkView .chk-progress-nums { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  #checkView .chk-progress-cur { font-size:26px; font-weight:900; color:#fff; line-height:1; }
  #checkView .chk-progress-cur span { font-size:13px; font-weight:400; color:#666; margin-left:2px; }
  #checkView .chk-progress-target { font-size:12px; color:#555; }
  #checkView .chk-bar-bg { height:6px; background:#2a2a2a; border-radius:99px; overflow:hidden; }
  #checkView .chk-bar-fill { height:100%; border-radius:99px; background:#a78bfa; transition:width .4s ease; }
  #checkView .chk-bar-fill.done { background:#6ee7a0; }

  #checkView .chk-list { padding:14px 16px 0; }
  #checkView .chk-item { display:flex; align-items:flex-start; gap:12px; padding:13px 0; border-bottom:1px solid #1e1e1e; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity .2s; }
  #checkView .chk-item:last-child { border-bottom:none; }
  #checkView .chk-item.checked { opacity:.45; }
  #checkView .chk-box { width:24px; height:24px; border-radius:50%; border:2px solid #333; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .2s; background:transparent; }
  #checkView .chk-item.checked .chk-box { border-color:#a78bfa; background:#a78bfa; }
  #checkView .mode-rest .chk-item.checked .chk-box { border-color:#6ee7a0; background:#6ee7a0; }
  #checkView .chk-mark { font-size:13px; display:none; color:#0f0f0f; }
  #checkView .chk-item.checked .chk-mark { display:block; }
  #checkView .chk-body { flex:1; }
  #checkView .chk-time { font-size:10px; font-weight:700; color:#555; letter-spacing:.5px; margin-bottom:3px; text-transform:uppercase; }
  #checkView .chk-desc { font-size:14px; color:#ccc; line-height:1.5; }
  #checkView .item-supp { color:#a78bfa; font-weight:700; }
  #checkView .mode-rest .item-supp { color:#6ee7a0; }
  #checkView .item-warn { font-size:11px; color:#ef4444; font-weight:700; display:block; margin-top:2px; }
  #checkView .item-note { font-size:11px; color:#777; display:block; margin-top:2px; }
  #checkView .chk-protein { font-size:14px; font-weight:900; color:#ef4444; min-width:36px; text-align:right; padding-top:2px; flex-shrink:0; }
  #checkView .chk-protein.na { color:#333; font-size:12px; font-weight:400; }

  #checkView .chk-goal { margin:16px 16px 0; padding:14px; background:#0a2010; border:1px solid #1a4a25; border-radius:14px; text-align:center; display:none; }
  #checkView .chk-goal.show { display:block; }
  #checkView .chk-goal .goal-emoji { font-size:28px; margin-bottom:4px; }
  #checkView .chk-goal .goal-text { font-size:14px; font-weight:700; color:#6ee7a0; }
  #checkView .chk-goal .goal-sub { font-size:11px; color:#3a7a4a; margin-top:3px; }

  #checkView .chk-weekly { margin:16px 16px 0; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:14px; padding:12px 14px; }
  #checkView .chk-weekly-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  #checkView .chk-weekly-title { font-size:11px; font-weight:700; color:#555; letter-spacing:1px; text-transform:uppercase; }
  #checkView .chk-weekly-rate { font-size:13px; font-weight:900; color:#6ee7a0; }
  #checkView .chk-weekly-days { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  #checkView .chk-day-cell { display:flex; flex-direction:column; align-items:center; gap:4px; }
  #checkView .chk-day-label { font-size:9px; color:#444; font-weight:700; }
  #checkView .chk-day-label.today { color:#a78bfa; }
  #checkView .chk-day-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
  #checkView .chk-day-dot.done    { background:#0d3020; color:#6ee7a0; border:1.5px solid #2a6a45; }
  #checkView .chk-day-dot.partial { background:#2a1a00; color:#e8b84b; border:1.5px solid #5a3a00; }
  #checkView .chk-day-dot.empty   { background:#1a1a1a; color:#333; border:1.5px solid #2a2a2a; }
  #checkView .chk-day-dot.today-ring { box-shadow:0 0 0 2px #a78bfa; }

  #checkView .chk-reset { padding:20px 16px 0; text-align:center; }
  #checkView .chk-reset-btn { background:transparent; border:1px solid #2a2a2a; border-radius:8px; color:#444; padding:8px 20px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🥗 食事記録</h1>
    <div class="header-btns">
      <button class="icon-btn" onclick="exportData()">📤 エクスポート</button>
    </div>
  </div>
  <div class="date-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="date-label" id="dateLabel"></div>
    <button onclick="changeDay(1)">›</button>
    <span id="sync-status" style="font-size:11px;color:#666;white-space:nowrap">⏳</span>
  </div>
</header>

<div id="todayView">
  <!-- タンパク質サマリー -->
  <div class="protein-summary">
    <div class="protein-label">今日のタンパク質</div>
    <div class="protein-numbers">
      <span class="protein-current" id="totalProtein">0</span>
      <span class="protein-unit">g</span>
      <span class="protein-target">/ 140g</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 食事セクション -->
  <div id="mealSections"></div>

  <!-- よく使う食材 -->
  <div class="quick-section">
    <div class="quick-title">⚡ クイック追加</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>
</div>

<div id="historyView" style="display:none">
  <div style="padding:16px 16px 8px; font-size:13px; color:#888;">過去の記録</div>
  <div class="history-list" id="historyList"></div>
</div>

<div id="checkView" style="display:none">
  <div class="chk-mode-toggle">
    <button class="chk-mode-btn" id="chk-btn-gym" onclick="chkSetMode('gym')">🏋️ ジムの日</button>
    <button class="chk-mode-btn" id="chk-btn-rest" onclick="chkSetMode('rest')">🛌 休日</button>
  </div>
  <div class="chk-progress">
    <div class="chk-progress-nums">
      <div class="chk-progress-cur" id="chk-p-cur">0<span>/0</span></div>
      <div class="chk-progress-target">今日のサプリ</div>
    </div>
    <div class="chk-bar-bg"><div class="chk-bar-fill" id="chk-p-bar" style="width:0%"></div></div>
  </div>
  <div class="chk-list" id="chk-list"></div>
  <div class="chk-goal" id="chk-goal">
    <div class="goal-emoji">💊</div>
    <div class="goal-text">サプリ全部クリア！</div>
    <div class="goal-sub">今日のサプリルーティン完了</div>
  </div>
  <div class="chk-weekly" id="chk-weekly"></div>
  <div class="chk-reset"><button class="chk-reset-btn" onclick="chkResetToday()">今日をリセット</button></div>
</div>

<div id="recipeView" style="display:none;padding:16px">
  <!-- レシピ計算機 -->
  <div style="background:#1a1a1a;border-radius:14px;padding:16px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">🍳 レシピ計算（作り置き）</div>
    <input type="text" id="recipeName" placeholder="レシピ名（例: だれうま 鶏むねチャーシュー）"
      style="width:100%;box-sizing:border-box;background:#2a2a2a;border:none;border-radius:10px;color:#eee;padding:12px;font-size:14px;margin-bottom:12px" />

    <div style="font-size:12px;color:#888;margin-bottom:6px">材料</div>
    <div id="ingredientList"></div>
    <button onclick="addIngredientRow()" style="width:100%;background:#2a2a2a;border:1px dashed #444;border-radius:10px;color:#aaa;padding:10px;font-size:13px;cursor:pointer;margin-bottom:14px">＋ 材料を追加</button>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span style="font-size:13px;color:#aaa">何食分作る？</span>
      <input type="number" id="recipeServings" value="4" min="1" max="20" inputmode="numeric"
        oninput="updateRecipeCalc()"
        style="width:64px;background:#2a2a2a;border:none;border-radius:8px;color:#eee;padding:8px;font-size:15px;text-align:center" />
      <span style="font-size:13px;color:#aaa">食分</span>
    </div>

    <div style="background:#0d2018;border:1px solid #1a3a2a;border-radius:12px;padding:14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px">
        <span>合計</span><span id="recipeTotal">タンパク質 0g・0kcal</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:#4caf50">
        <span>1食あたり</span><span id="recipePerServing">0g P</span>
      </div>
    </div>

    <div style="display:flex;gap:10px">
      <button onclick="recordRecipeServing()" style="flex:1;background:#4caf50;border:none;border-radius:12px;color:#fff;padding:14px;font-size:15px;font-weight:700;cursor:pointer">1食分を記録</button>
      <button onclick="saveRecipe()" style="flex:1;background:#2a2a2a;border:none;border-radius:12px;color:#a78bfa;padding:14px;font-size:15px;font-weight:700;cursor:pointer">レシピを保存</button>
    </div>
  </div>

  <!-- 保存済みレシピ -->
  <div style="font-size:13px;color:#888;margin-bottom:8px">📚 保存したレシピ</div>
  <div id="savedRecipeList"></div>
</div>

<!-- 追加モーダル -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2 id="modalTitle">食事を追加</h2>
    <div class="form-group" style="position:relative">
      <label>食材・料理名</label>
      <input type="text" id="foodName" placeholder="例: 鶏むね肉" autocomplete="off" oninput="onFoodInput()" onkeydown="onFoodKeydown(event)" />
      <div id="suggestions" style="position:absolute;left:0;right:0;background:#2a2a2a;border-radius:0 0 10px 10px;z-index:10;display:none;max-height:200px;overflow-y:auto;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin:-8px 0 8px">
      <div id="nutritionStatus" style="font-size:12px;color:#888;flex:1;min-height:18px;"></div>
      <button id="claudeBtn" onclick="manualLookup()" style="display:none;background:#2a2a2a;border:none;border-radius:8px;color:#a78bfa;padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap">🤖 調べる</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>タンパク質 (g)</label>
        <input type="number" id="foodProtein" placeholder="自動入力" min="0" step="0.5" />
      </div>
      <div class="form-group">
        <label>カロリー (kcal)</label>
        <input type="number" id="foodKcal" placeholder="自動入力" min="0" />
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" onclick="addFood()">追加</button>
    </div>
  </div>
</div>

<div id="settingsView" style="display:none;padding:16px">
  <div style="background:#1a1a1a;border-radius:14px;padding:16px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">🤖 Claude API設定</div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">APIキーを設定すると、DBにない食品も自動で栄養素を調べます</div>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." style="width:100%;background:#2a2a2a;border:none;border-radius:10px;color:#eee;padding:12px;font-size:13px;margin-bottom:8px" />
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="saveApiKey()" style="flex:1;background:#4CAF50;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer">保存</button>
      <button onclick="testApiKey()" style="flex:1;background:#2a2a2a;border:none;border-radius:10px;color:#aaa;padding:12px;font-size:14px;cursor:pointer">🔬 テスト</button>
    </div>
    <div id="apiTestResult" style="font-size:12px;min-height:16px;text-align:center"></div>
  </div>
  <div style="background:#1a1a1a;border-radius:14px;padding:16px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">🔗 GitHub同期</div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">Personal Access Tokenを設定するとMac・iPhone間でデータが同期されます</div>
    <input type="password" id="tokenInput" placeholder="github_pat_..." style="width:100%;background:#2a2a2a;border:none;border-radius:10px;color:#eee;padding:12px;font-size:13px;margin-bottom:8px" />
    <button onclick="saveGitHubToken()" style="width:100%;background:#4CAF50;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer">トークンを保存</button>
  </div>
</div>

<!-- グラムピッカー -->

// Anthropic API キー（ローカル保存）
function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

// 食品名からDBを検索
function searchFoodDB(query) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase();
  return FOOD_DB.filter(f => f.name.toLowerCase().includes(q)).slice(0, 8);
}

// Claude APIで栄養素を推定
let claudeTimer = null;
let claudeAbortController = null;  // 進行中リクエストのキャンセル用

async function lookupWithClaude(name) {
  // 前のリクエストをキャンセル
  if (claudeAbortController) {
    claudeAbortController.abort();
    claudeAbortController = null;
  }

  const apiKey = getApiKey();
  if (!apiKey) {
    setNutritionStatus('⚠️ Claude APIキーが未設定です（設定タブから追加）', '#F44336');
    return;
  }

  claudeAbortController = new AbortController();
  const signal = claudeAbortController.signal;

  setNutritionStatus('🤖 Claudeが調べています...', '#888');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      signal,
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: `食品「${name}」について、具体的な材料・量をもとに栄養素を推定してください。
例：
- オムライス大盛り：卵2個＋ライス300g＋鶏肉80g → タンパク質約22g、580kcal
- カレー大盛り：ライス300g＋豚肉60g＋ルー → タンパク質約17g、750kcal
このように実際の材料から計算し、JSON形式のみで返してください：
{"protein": 数値, "kcal": 数値, "unit": "1人前の量の説明"}`
        }]
      })
    });

    // HTTPエラーを明示的に表示
    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      const errMsg = errJson.error?.message || `HTTP ${res.status}`;
      setNutritionStatus(`❌ APIエラー: ${errMsg}`, '#F44336');
      return;
    }

    const json = await res.json();
    const text = json.content?.[0]?.text || '';
    const match = text.match(/\{[^}]+\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      document.getElementById('foodProtein').value = parsed.protein || '';
      document.getElementById('foodKcal').value = parsed.kcal || '';
      setNutritionStatus(`✅ ${parsed.unit || '1人前'}: タンパク質${parsed.protein}g / ${parsed.kcal}kcal`, '#4CAF50');
    } else {
      // レスポンスをそのまま表示してデバッグしやすくする
      setNutritionStatus(`⚠️ 解析失敗（手動入力）: ${text.slice(0, 50)}`, '#F0A000');
    }
  } catch(e) {
    if (e.name === 'AbortError') return; // キャンセルは無視
    setNutritionStatus(`❌ 通信エラー: ${e.message}`, '#F44336');
  } finally {
    claudeAbortController = null;
  }
}

function setNutritionStatus(msg, color) {
  const el = document.getElementById('nutritionStatus');
  el.textContent = msg;
  el.style.color = color || '#888';
}

let selectedSuggestion = -1;

function onFoodInput() {
  const val = document.getElementById('foodName').value;
  const results = searchFoodDB(val);
  const box = document.getElementById('suggestions');
  selectedSuggestion = -1;

  // 「調べる」ボタンの表示制御
  const claudeBtn = document.getElementById('claudeBtn');
  if (claudeBtn) claudeBtn.style.display = val.length >= 1 ? 'block' : 'none';

  // DB候補を表示
  if (results.length > 0) {
    // 前のClaude検索をキャンセル
    clearTimeout(claudeTimer);
    if (claudeAbortController) { claudeAbortController.abort(); claudeAbortController = null; }
    box.style.display = 'block';
    box.innerHTML = results.map((f, i) => `
      <div onclick="selectFood(${i})" style="padding:10px 14px;border-bottom:1px solid #333;cursor:pointer;font-size:14px;"
           onmouseover="this.style.background='#333'" onmouseout="this.style.background=''"
           data-idx="${i}">
        ${f.name} <span style="color:#4CAF50;float:right">${f.protein}g P</span>
        <span style="color:#666;font-size:12px;display:block">${f.unit} / ${f.kcal}kcal</span>
      </div>
    `).join('');
    window._suggestions = results;
  } else {
    box.style.display = 'none';
    window._suggestions = [];
    // DBにない場合 → Claude に聞く（800ms待機）
    if (val.length >= 2) {
      clearTimeout(claudeTimer);
      // lookup中でなければステータスをリセット
      if (!claudeAbortController) {
        setNutritionStatus('', '#888');
        document.getElementById('foodProtein').value = '';
        document.getElementById('foodKcal').value = '';
      }
      claudeTimer = setTimeout(() => lookupWithClaude(val), 800);
    } else {
      clearTimeout(claudeTimer);
      if (claudeAbortController) { claudeAbortController.abort(); claudeAbortController = null; }
      setNutritionStatus('', '#888');
    }
  }
}

function selectFood(i) {
  const f = window._suggestions[i];
  document.getElementById('foodName').value = f.name;
  document.getElementById('foodProtein').value = f.protein;
  document.getElementById('foodKcal').value = f.kcal;
  document.getElementById('suggestions').style.display = 'none';
  setNutritionStatus(`✅ ${f.unit}: タンパク質${f.protein}g / ${f.kcal}kcal`, '#4CAF50');
}

function onFoodKeydown(e) {
  const box = document.getElementById('suggestions');
  const items = box.querySelectorAll('[data-idx]');
  if (e.key === 'ArrowDown') {
    selectedSuggestion = Math.min(selectedSuggestion + 1, items.length - 1);
    items.forEach((el, i) => el.style.background = i === selectedSuggestion ? '#333' : '');
  } else if (e.key === 'ArrowUp') {
    selectedSuggestion = Math.max(selectedSuggestion - 1, 0);
    items.forEach((el, i) => el.style.background = i === selectedSuggestion ? '#333' : '');
  } else if (e.key === 'Enter' && selectedSuggestion >= 0) {
    selectFood(selectedSuggestion);
  }
}

function getKey(date) {
  // JST（ローカル時刻）で日付キーを生成（toISOStringはUTCになるため使わない）
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function toBase64UTF8(str) {
  const bytes = new TextEncoder().encode(str);
  return btoa(Array.from(bytes).map(b => String.fromCharCode(b)).join(''));
}
function fromBase64UTF8(b64) {
  const binaryStr = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(binaryStr.split('').map(c => c.charCodeAt(0)));
  return new TextDecoder().decode(bytes);
}
function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}
function saveToLocalStorage() {
  localStorage.setItem('shokuji_data', JSON.stringify(data));
}
function loadFromLocalStorage() {
  const raw = localStorage.getItem('shokuji_data');
  data = raw ? JSON.parse(raw) : {};
}
async function loadData() {
  const token = localStorage.getItem('github_token') || '';
  if (!token) { loadFromLocalStorage(); showSyncStatus('🔑 未設定'); return; }
  try {
    showSyncStatus('⏳');
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FOOD_FILE}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) {
      const d = await res.json();
      foodSHA = d.sha;
      data = JSON.parse(fromBase64UTF8(d.content));
      saveToLocalStorage();
      showSyncStatus('✅ 同期済み');
    } else if (res.status === 404) {
      loadFromLocalStorage(); showSyncStatus('📱 新規');
    } else if (res.status === 401) {
      loadFromLocalStorage(); showSyncStatus('🔑 エラー');
    } else {
      loadFromLocalStorage(); showSyncStatus('⚠️ 失敗');
    }
  } catch(e) { loadFromLocalStorage(); showSyncStatus('📵 オフライン'); }
}
let foodPendingSync = false;

// 進行中の最新SHAを取得（保存前・409時に呼ぶ）
async function fetchFoodSHA() {
  const token = localStorage.getItem('github_token') || '';
  if (!token) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FOOD_FILE}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) { const d = await res.json(); foodSHA = d.sha; }
    else if (res.status === 404) { foodSHA = null; }
  } catch(e) {}
}

async function saveData() {
  saveToLocalStorage();
  const token = localStorage.getItem('github_token') || '';
  if (!token) { showSyncStatus('🔑 未設定'); foodPendingSync = true; return; }
  // SHA未取得なら先に取りに行く（422防止）
  if (!foodSHA) await fetchFoodSHA();
  showSyncStatus('⏳ 保存中');
  const content = toBase64UTF8(JSON.stringify(data, null, 2));
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const body = { message: `food records ${new Date().toISOString()}`, content };
      if (foodSHA) body.sha = foodSHA;
      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FOOD_FILE}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        const d = await res.json();
        foodSHA = d.content.sha;
        foodPendingSync = false;
        showSyncStatus('✅ 同期済み');
        return;
      } else if (res.status === 409 || res.status === 422) {
        // SHA競合 → 最新を取り直して再試行
        await fetchFoodSHA();
        continue;
      } else {
        showSyncStatus(`⚠️ 同期失敗 (${res.status})`);
        foodPendingSync = true;
        return;
      }
    } catch(e) {
      // 通信エラー → バックオフして再試行
      if (attempt < 3) { await new Promise(r => setTimeout(r, 2000 * attempt)); continue; }
      showSyncStatus('📵 オフライン保存');
      foodPendingSync = true;
      return;
    }
  }
  showSyncStatus('⚠️ 同期失敗');
  foodPendingSync = true;
}

}

function calcProtein(date) {
  const d = getDayData(date);
  return MEALS.reduce((sum, m) => sum + d[m.id].reduce((s, f) => s + (f.protein || 0), 0), 0);

  const servings = Math.max(1, parseInt(document.getElementById('recipeServings').value) || 1);
  return { p, k, servings, perP: p / servings, perK: k / servings };
}

  const list = getRecipes();
  const recipe = {
    name,
    servings: t.servings,
    ingredients: _ingredients.filter(x => x.name || x.protein),
    perP: Math.round(t.perP * 10) / 10,
    perK: Math.round(t.perK),
  };
  const idx = list.findIndex(r => r.name === name);
  if (idx >= 0) list[idx] = recipe; else list.push(recipe);
  saveRecipes(list);
  renderSavedRecipes();

    const total = MEALS.reduce((s, m) => s + (d[m.id] || []).reduce((ss, f) => ss + (f.protein || 0), 0), 0);
    const date = new Date(key);
    const label = `${date.getMonth()+1}/${date.getDate()}（${['日','月','火','水','木','金','土'][date.getDay()]}）`;
    const allFoods = MEALS.flatMap(m => (d[m.id] || []).map(f => f.name));
    return `
      <div class="history-day">
        <div class="history-day-header">
          <span class="history-day-date">${label}</span>
          <span class="history-day-protein">${total.toFixed(1)}g / 140g</span>
        </div>
        <div style="font-size:13px;color:#666">${allFoods.slice(0,5).join('・')}${allFoods.length > 5 ? ' 他' : ''}</div>
      </div>
    `;
  }).join('');
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `食事記録_${getKey(new Date())}.json`;
  a.click();
}

// ===== チェックリスト（サプリ表統合） =====
const CHK_ITEMS = {
  gym: [
    { time: '起床後',   desc: '<span class="item-supp">マルチビタミン</span>' },
    { time: '起床後',   desc: '<span class="item-supp">クレアチン 5g</span>' },
    { time: 'ジム30分前', desc: '<span class="item-supp">C4（プレワークアウト）</span><span class="item-warn">※レッドブル同日NG</span>' },
    { time: 'ジム中',   desc: '<span class="item-supp">EAA</span> 水500ml' },
    { time: 'トレ直後',  desc: '<span class="item-supp">ホエイ</span> 1スクープ<span class="item-note">※空腹トレの日だけマルト1スクープ追加</span>' },
  ],
  rest: [
    { time: '起床後', desc: '<span class="item-supp">マルチビタミン</span>' },
    { time: '起床後', desc: '<span class="item-supp">クレアチン 5g</span>' },
  ]
};
let chkMode = 'gym';
let chkChecked = {};

function chkStorageKey() { return `food_check_${getKey(currentDate)}`; }

function chkLoad() {
  const s = localStorage.getItem(chkStorageKey());
  chkChecked = s ? JSON.parse(s) : {};
  chkMode = localStorage.getItem('food_check_mode') || 'gym';
}
function chkSave() {
  localStorage.setItem(chkStorageKey(), JSON.stringify(chkChecked));
  localStorage.setItem('food_check_mode', chkMode);
}
function chkSetMode(m) { chkMode = m; chkSave(); chkRender(); }
function chkToggle(idx) {
  const key = `${chkMode}-${idx}`;
  chkChecked[key] = !chkChecked[key];
  chkSave(); chkRender(); chkRenderWeekly();
}
function chkResetToday() {
  if (!confirm('今日のチェックをリセットしますか？')) return;
  Object.keys(chkChecked).filter(k => k.startsWith('gym-') || k.startsWith('rest-')).forEach(k => delete chkChecked[k]);
  chkSave(); chkRender(); chkRenderWeekly();
}
function chkRender() {
  document.getElementById('chk-btn-gym').className = 'chk-mode-btn' + (chkMode === 'gym' ? ' active-gym' : '');
  document.getElementById('chk-btn-rest').className = 'chk-mode-btn' + (chkMode === 'rest' ? ' active-rest' : '');
  const items = CHK_ITEMS[chkMode];
  let done = 0;
  const html = items.map((item, i) => {
    const key = `${chkMode}-${i}`;
    const isChecked = !!chkChecked[key];
    if (isChecked) done++;
    return `
      <div class="chk-item ${isChecked ? 'checked' : ''}" onclick="chkToggle(${i})">
        <div class="chk-box"><span class="chk-mark">✓</span></div>
        <div class="chk-body">
          <div class="chk-time">${item.time}</div>
          <div class="chk-desc">${item.desc}</div>
        </div>
      </div>`;
  }).join('');
  const section = document.getElementById('chk-list');
  section.className = `chk-list mode-${chkMode}`;
  section.innerHTML = html;
  const total = items.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('chk-p-cur').innerHTML = `${done}<span>/${total}</span>`;
  const bar = document.getElementById('chk-p-bar');
  bar.style.width = pct + '%';
  bar.className = 'chk-bar-fill' + (done >= total && total > 0 ? ' done' : '');
  const allDone = total > 0 && items.every((_, i) => !!chkChecked[`${chkMode}-${i}`]);
  document.getElementById('chk-goal').className = 'chk-goal' + (allDone ? ' show' : '');
}
function chkDateStr(offset) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + offset);
  return getKey(d);
}
// 指定日のサプリ消化率を返す { done, total } / 未記録は null
function chkDoneForDate(date) {
  const s = localStorage.getItem(`food_check_${date}`);
  if (!s) return null;
  const dayChecked = JSON.parse(s);
  // その日チェックがあるモードを判定（チェック数が多い方を採用）
  let best = null;
  for (const m of ['gym', 'rest']) {
    const items = CHK_ITEMS[m];
    let done = 0;
    for (let i = 0; i < items.length; i++) if (dayChecked[`${m}-${i}`]) done++;
    if (done > 0 && (!best || done > best.done)) best = { done, total: items.length };
  }
  return best;
}
function chkRenderWeekly() {
  const DAY_LABELS = ['日','月','火','水','木','金','土'];
  let doneDays = 0, recordedDays = 0, cells = '';
  for (let i = -6; i <= 0; i++) {
    const date = chkDateStr(i);
    const d = new Date(date + 'T00:00:00');
    const label = DAY_LABELS[d.getDay()];
    const isToday = i === 0;
    const r = chkDoneForDate(date);
    let dotClass, dotText;
    if (!r) { dotClass = 'empty'; dotText = '—'; }
    else if (r.done >= r.total) { dotClass = 'done'; dotText = '✓'; doneDays++; recordedDays++; }
    else { dotClass = 'partial'; dotText = r.done; recordedDays++; }
    if (isToday) dotClass += ' today-ring';
    cells += `
      <div class="chk-day-cell">
        <div class="chk-day-label${isToday ? ' today' : ''}">${label}</div>
        <div class="chk-day-dot ${dotClass}">${dotText}</div>
      </div>`;
  }
  const rateText = recordedDays > 0 ? `${doneDays}/${recordedDays}日 完了` : '記録なし';
  document.getElementById('chk-weekly').innerHTML = `
    <div class="chk-weekly-header">
      <div class="chk-weekly-title">📅 今週の達成率</div>
      <div class="chk-weekly-rate">${rateText}</div>
    </div>
    <div class="chk-weekly-days">${cells}</div>`;
}

// 初期化
loadData().then(() => render());
// APIキーは設定タブから入力してください
</script>
