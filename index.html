<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>筋トレ記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: 76px;
  }

  header {
    background: #1a1a1a;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  header h1 { font-size: 18px; font-weight: 700; }

  .header-btns { display: flex; gap: 8px; }

  .icon-btn {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: #aaa;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  .day-tabs {
    display: flex;
    gap: 8px;
  }

  .day-tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #2a2a2a;
    color: #666;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .day-tab.active-A { background: #dc5050; color: #fff; }
  .day-tab.active-B { background: #34a89a; color: #fff; }
  .day-tab.active-C { background: #4285f4; color: #fff; }

  .date-bar {
    padding: 10px 20px;
    background: #161616;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #222;
  }

  .date-bar label { color: #666; font-size: 12px; white-space: nowrap; }

  .date-bar input[type="date"] {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    color: #eee;
    padding: 7px 10px;
    font-size: 15px;
    flex: 1;
  }

  .today-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    color: #aaa;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  .section-wrap { padding: 14px 20px; }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .exercise-card {
    background: #1e1e1e;
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }

  /* 種目選択パネル */
  .slot-picker {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .slot-picker-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #ccc;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .slot-list { padding: 0 14px 10px; }
  .slot-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px solid #222;
  }
  .slot-name {
    font-size: 12px;
    color: #888;
    width: 84px;
    flex-shrink: 0;
  }
  .slot-select {
    flex: 1;
    min-width: 0;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #eee;
    padding: 9px 10px;
    font-size: 13px;
  }

  /* RIR（限界までの距離）入力 */
  .rir-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px 14px;
  }
  .rir-label { font-size: 11px; color: #777; flex-shrink: 0; }
  .rir-btns { display: flex; gap: 6px; flex: 1; }
  .rir-btn {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #aaa;
    padding: 8px 0;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .rir-btn.active { background: #1b5e20; border-color: #2e7d32; color: #fff; }

  .rir-select {
    background: #14241c; border: 1px solid #25402f; border-radius: 6px;
    color: #7dd8a8; padding: 4px 2px; font-size: 13px; width: 100%;
    text-align: center; -webkit-appearance: none; appearance: none;
  }
  .rir-hint { font-size: 10px; color: #555; padding: 0 14px 12px; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: #161616; border-top: 1px solid #2a2a2a; z-index: 200;
  }
  .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 9px 0 13px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .tab-btn.active { color: #fff; }
  .tab-btn .ic { display: block; font-size: 19px; margin-bottom: 1px; }

  .week-counter { margin: 12px 20px 0; padding: 12px 14px; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 14px; }
  .wc-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .wc-title { font-size: 12px; color: #aaa; font-weight: 700; }
  .wc-count { font-size: 14px; font-weight: 700; }
  .wc-count.hit { color: #2ecc71; }
  .wc-count.miss { color: #e8a93b; }
  .wc-dots { display: flex; gap: 6px; }
  .wc-dot { flex: 1; height: 8px; border-radius: 99px; background: #2a2a2a; }
  .wc-dot.on { background: #2ecc71; }

  .day-suggest { margin: 8px 20px 0; padding: 10px 14px; background: #15201c; border: 1px solid #244; border-radius: 12px; font-size: 12px; color: #9cc; cursor: pointer; }
  .day-suggest:empty { display: none; }
  .day-suggest b { color: #7dd8c8; }

  .card-tools { padding: 0 14px 10px; }
  .mini-btn { background: #222; border: 1px solid #333; border-radius: 8px; color: #aaa; padding: 7px 10px; font-size: 12px; cursor: pointer; }
  .mini-btn:active { opacity: 0.7; }

  .trend-box { margin: 0 14px 10px; padding: 8px 10px; background: #161616; border: 1px solid #242424; border-radius: 8px; }
  .trend-head { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 2px; }
  .trend-foot { display: flex; justify-content: space-between; font-size: 9px; color: #555; }

  /* 週間ボリュームパネル */
  .vol-card {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 12px 14px;
  }
  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .vol-muscle { font-size: 12px; color: #ccc; width: 70px; flex-shrink: 0; }
  .vol-bar-bg {
    flex: 1;
    height: 8px;
    background: #2a2a2a;
    border-radius: 99px;
    overflow: hidden;
  }
  .vol-bar { height: 100%; border-radius: 99px; }
  .vol-bar.vol-under { background: #c0392b; }
  .vol-bar.vol-ok    { background: #2ecc71; }
  .vol-bar.vol-over  { background: #e08e0b; }
  .vol-num { font-size: 12px; font-weight: 700; width: 64px; text-align: right; flex-shrink: 0; }
  .vol-num.vol-under { color: #e07b6b; }
  .vol-num.vol-ok    { color: #2ecc71; }
  .vol-num.vol-over  { color: #e8a93b; }
  .vol-target { color: #555; font-weight: 400; font-size: 10px; }
  .vol-note { font-size: 10px; color: #555; margin-top: 8px; line-height: 1.5; }

  .exercise-header {
    padding: 12px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .exercise-name { font-weight: 700; font-size: 15px; }

  .prev-box { text-align: right; }

  .prev-label { font-size: 10px; color: #555; margin-bottom: 2px; }

  .prev-val { font-size: 13px; font-weight: 700; color: #555; }
  .prev-val.has-data { color: #f0c040; }

  .prev-date { font-size: 10px; color: #444; }

  .rec-bar {
    margin: 0 14px 10px;
    padding: 7px 10px;
    background: #0d2420;
    border: 1px solid #1a3a30;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .rec-label { color: #34a89a; font-weight: 700; white-space: nowrap; }
  .rec-val { color: #7dd8c8; font-weight: 700; }
  .rec-note { color: #3a6a60; font-size: 11px; margin-left: auto; }

  .weight-row {
    padding: 0 14px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weight-label { font-size: 11px; color: #555; white-space: nowrap; }

  select {
    background: #2a2a2a;
    border: 1px solid #383838;
    border-radius: 8px;
    color: #eee;
    padding: 8px 6px;
    font-size: 15px;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }

  .sets-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 0 14px 12px;
  }

  .set-col { display: flex; flex-direction: column; gap: 4px; }
  .set-label { font-size: 10px; color: #555; text-align: center; font-weight: 600; }

  .weight-input {
    background: #2a2a2a;
    border: 1px solid #383838;
    border-radius: 8px;
    color: #eee;
    padding: 8px 10px;
    font-size: 18px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }
  .weight-input::-webkit-outer-spin-button,
  .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .weight-input::placeholder { color: #444; }

  .cheat-input {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #f0a040;
    padding: 4px;
    font-size: 12px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }
  .cheat-input::-webkit-outer-spin-button,
  .cheat-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .cheat-input::placeholder { color: #333; font-size: 10px; }
  .cheat-label { font-size: 9px; color: #444; text-align: center; }

  .save-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 4px 20px 0;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:active { opacity: 0.75; }
  .save-A { background: #dc5050; color: #fff; }
  .save-B { background: #34a89a; color: #fff; }
  .save-C { background: #4285f4; color: #fff; }

  .export-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px 0;
  }

  .export-btn {
    flex: 1;
    padding: 11px;
    border: 1px solid #333;
    border-radius: 10px;
    background: #1e1e1e;
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  .export-btn:active { background: #2a2a2a; }

  .divider { height: 1px; background: #1e1e1e; margin: 16px 0 0; }

  .history-card {
    background: #1a1a1a;
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 1px solid #222;
  }

  .history-date-bar {
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
  }

  .history-date-bar.day-A { background: #2a1010; color: #dc5050; }
  .history-date-bar.day-B { background: #0a2420; color: #34a89a; }
  .history-date-bar.day-C { background: #0a1828; color: #4285f4; }

  .history-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    border-top: 1px solid #1e1e1e;
    gap: 8px;
  }

  .h-name { flex: 1; font-size: 12px; color: #bbb; }
  .h-weight { font-size: 13px; font-weight: 700; color: #eee; min-width: 55px; text-align: right; }
  .h-sets { font-size: 11px; color: #555; text-align: right; }

  .empty { color: #444; font-size: 14px; text-align: center; padding: 36px 0; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a2a2a;
    border: 1px solid #444;
    color: #eee;
    padding: 11px 22px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #1e1e1e;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 70vh;
  }

  .modal h3 { font-size: 15px; margin-bottom: 12px; color: #eee; }

  .modal textarea {
    width: 100%;
    height: 180px;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    color: #6aff6a;
    font-family: monospace;
    font-size: 12px;
    padding: 12px;
    resize: none;
  }

  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .modal-copy { background: #4285f4; color: #fff; }
  .modal-close { background: #2a2a2a; color: #aaa; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>💪 筋トレ記録</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="sync-status" style="font-size:12px;color:#666;">⏳ 読込中...</span>
      <button class="icon-btn" onclick="loadFromGitHub()">🔄</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="day-tabs">
    <button class="day-tab" id="tab-A" onclick="switchDay('A')">Day A<br>Push</button>
    <button class="day-tab" id="tab-B" onclick="switchDay('B')">Day B<br>Pull</button>
    <button class="day-tab" id="tab-C" onclick="switchDay('C')">Day C<br>Legs</button>
  </div>
</header>

<div id="view-log">
  <div class="date-bar">
    <label>日付</label>
    <input type="date" id="date-input">
    <button class="today-btn" onclick="setToday()">今日</button>
  </div>

  <div class="week-counter" id="week-counter"></div>
  <div class="day-suggest" id="day-suggest"></div>

  <div class="section-wrap">
    <div class="section-title">今日の記録</div>
    <div id="exercise-cards"></div>
  </div>

  <button class="save-btn save-A" id="save-btn" onclick="saveRecord()">✅ 保存</button>
</div>

<div id="view-history" style="display:none">
  <div class="section-wrap">
    <div id="volume-panel"></div>
  </div>
  <div class="divider"></div>
  <div class="section-wrap">
    <div class="section-title">過去の記録</div>
    <div id="history-list"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="vtab-log" onclick="showView('log')"><span class="ic">📝</span>記録</button>
  <button class="tab-btn" id="vtab-history" onclick="showView('history')"><span class="ic">📊</span>履歴</button>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>⚙️ GitHub設定</h3>
    <p style="font-size:12px;color:#666;margin-bottom:12px;">GitHub Fine-grained PATを入力してください。<br>このデバイスのみに保存されます。</p>
    <input type="password" id="token-input"
      style="width:100%;background:#111;border:1px solid #333;border-radius:10px;color:#6aff6a;font-family:monospace;font-size:13px;padding:12px;margin-bottom:8px;"
      placeholder="github_pat_...">
    <div id="token-status" style="font-size:12px;color:#666;margin-bottom:12px;min-height:16px;"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-copy" onclick="saveToken()">保存</button>
      <button class="modal-btn" style="background:#5a1a1a;color:#f08080;" onclick="clearToken()">削除</button>
      <button class="modal-btn modal-close" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<!-- JSONモーダル -->
<div class="modal-overlay" id="json-modal">
  <div class="modal">
    <h3 id="modal-title">JSONデータ</h3>
    <textarea id="modal-text" readonly></textarea>
    <div class="modal-btns">
      <button class="modal-btn modal-copy" onclick="copyJSON()">コピー</button>
      <button class="modal-btn modal-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 種目プール（FITPLACE24綾瀬店の設備ベース）
// 各枠(slot)の先頭が初期選択。代替種目を枠内で選べる。
// muscle=部位（週間ボリューム集計の単位）/ sets=推奨セット数
const MENU = {
  A: { name: 'Push', slots: [
    { slot: '胸 メイン',  muscle: '胸',   sets: 4, options: ['ベンチプレス', 'スミスマシンベンチプレス', 'チェストプレス', 'インクラインチェストプレス', 'チェスト＆デクラインコンボ', 'インクラインダンベルプレス', 'ダンベルプレス'] },
    { slot: '胸 補助',    muscle: '胸',   sets: 3, options: ['ペックフライ', 'ケーブルフライ', 'ディップス'] },
    { slot: '肩 プレス',  muscle: '肩',   sets: 3, options: ['ダンベルショルダープレス', 'ショルダープレスマシン', 'スミスマシンショルダープレス'] },
    { slot: '肩 サイド',  muscle: '肩',   sets: 3, options: ['サイドレイズ', 'ケーブルサイドレイズ'] },
    { slot: '三頭',       muscle: '三頭', sets: 3, options: ['ケーブルプッシュダウン', 'スカルクラッシャー', 'ディップス'] },
  ]},
  B: { name: 'Pull', slots: [
    { slot: '背中 縦引き', muscle: '背中', sets: 4, options: ['ラットプルダウン', 'ワイドプルダウン', '懸垂'] },
    { slot: '背中 横引き', muscle: '背中', sets: 4, options: ['ローロウ', 'フロントロウ', 'ワンハンドダンベルロウ'] },
    { slot: '背中 補助',   muscle: '背中', sets: 3, options: ['プルオーバー', 'デッドリフト', 'ケーブルプルオーバー'] },
    { slot: '二頭',        muscle: '二頭', sets: 3, options: ['ダンベルカール', 'インクラインダンベルカール', 'ケーブルカール'] },
    { slot: '後肩・僧帽',  muscle: '後肩', sets: 3, options: ['リバースフライ', 'シュラッグ'] },
  ]},
  C: { name: 'Legs', slots: [
    { slot: '脚 メイン',  muscle: '脚',       sets: 4, options: ['スクワット', 'ハックスクワット', 'レッグプレス', 'アングルドレッグプレス', 'スミスマシンスクワット'] },
    { slot: '大腿四頭',   muscle: '脚',       sets: 3, options: ['レッグエクステンション'] },
    { slot: 'ハム・尻',   muscle: 'ハム・尻', sets: 3, options: ['レッグカール', 'ヒップスラスト'] },
    { slot: '内/外もも',  muscle: '内/外',    sets: 3, options: ['アダクション', 'アブダクション'] },
    { slot: 'カーフ・腹', muscle: 'カーフ・腹', sets: 3, options: ['カーフレイズ', 'アブドミナルクランチ', 'ロータリートーソー'] },
  ]},
};

// 週間ボリューム目標（セット/週・部位別。筋肥大の用量反応に基づく10-20set/部位ベース）
const VOLUME_TARGET = {
  '胸': [10,20], '肩': [10,18], '三頭': [6,12],
  '背中': [10,20], '二頭': [6,12], '後肩': [6,12],
  '脚': [10,20], 'ハム・尻': [8,16], '内/外': [4,10], 'カーフ・腹': [6,15],
};

const SKIP = '__skip__';
const ADD  = '__add__';

const REPS = Array.from({length: 21}, (_, i) => i);

let currentDay = 'A';
let records = [];

// 枠ごとの選択（{ A: {0:'ベンチプレス', 1:'__skip__', ...}, ... }）
let selection = JSON.parse(localStorage.getItem('gym_selection') || '{}');
// 自分で追加した種目（{ 'A:0': ['自作種目'] }）
let customOptions = JSON.parse(localStorage.getItem('gym_custom') || '{}');
// 種目選択パネルの開閉
let pickerOpen = false;

function saveSelection() { localStorage.setItem('gym_selection', JSON.stringify(selection)); }
function saveCustom() { localStorage.setItem('gym_custom', JSON.stringify(customOptions)); }

function slotOptions(day, si) {
  const base = MENU[day].slots[si].options;
  const cust = customOptions[`${day}:${si}`] || [];
  return [...base, ...cust];
}

function chosenFor(day, si) {
  const sel = selection[day] && selection[day][si];
  if (sel !== undefined) return sel;
  return MENU[day].slots[si].options[0]; // 初期選択＝先頭
}

// その日の有効な種目（選択済み・スキップ除外・重複除外）
function activeExercises(day) {
  const out = [];
  MENU[day].slots.forEach((_, si) => {
    const c = chosenFor(day, si);
    if (c && c !== SKIP && !out.includes(c)) out.push(c);
  });
  return out;
}

// 種目名 → 所属slot（部位・推奨セット数の参照用）
function slotForExercise(name) {
  for (const day of ['A','B','C']) {
    const slots = MENU[day].slots;
    for (let si = 0; si < slots.length; si++) {
      if (slotOptions(day, si).includes(name)) return slots[si];
    }
  }
  return null;
}
function muscleFor(name) { const s = slotForExercise(name); return s ? s.muscle : 'その他'; }
function recSetsFor(name) { const s = slotForExercise(name); return s ? s.sets : 3; }

// 今週（月〜日）の部位別ボリューム（実施セット数を集計）
function weeklyVolume() {
  const today = new Date(); today.setHours(0,0,0,0);
  const offsetToMonday = (today.getDay() + 6) % 7;
  const monday = new Date(today); monday.setDate(today.getDate() - offsetToMonday);
  const vol = {};
  records.forEach(r => {
    const d = new Date(r.date + 'T00:00:00');
    if (d < monday || d > today) return;
    r.exercises.forEach(ex => {
      const m = muscleFor(ex.name);
      const doneSets = (ex.sets || []).filter(s => s > 0).length;
      vol[m] = (vol[m] || 0) + doneSets;
    });
  });
  return vol;
}

function renderVolume() {
  const el = document.getElementById('volume-panel');
  if (!el) return;
  const vol = weeklyVolume();
  const order = ['胸','肩','三頭','背中','二頭','後肩','脚','ハム・尻','内/外','カーフ・腹'];
  const rows = order.map(m => {
    const done = vol[m] || 0;
    const [min, max] = VOLUME_TARGET[m] || [0,0];
    let cls = 'vol-under', mark = '不足';
    if (done >= min && done <= max) { cls = 'vol-ok'; mark = 'OK'; }
    else if (done > max) { cls = 'vol-over'; mark = '過剰'; }
    const pct = max ? Math.min(100, Math.round(done / max * 100)) : 0;
    return `
      <div class="vol-row">
        <span class="vol-muscle">${m}</span>
        <div class="vol-bar-bg"><div class="vol-bar ${cls}" style="width:${pct}%"></div></div>
        <span class="vol-num ${cls}">${done}<span class="vol-target">/${min}-${max}</span></span>
      </div>`;
  }).join('');
  el.innerHTML = `
    <div class="section-title">今週のボリューム（月〜日・部位別セット数）</div>
    <div class="vol-card">${rows}</div>
    <div class="vol-note">目標：各部位 週${'10-20'}set（小さい筋は6-12）／緑=適正・赤=不足・橙=過剰</div>`;
}

function onSlotChange(day, si, val) {
  if (val === ADD) {
    const name = (prompt('追加する種目名を入力') || '').trim();
    if (name) {
      const key = `${day}:${si}`;
      customOptions[key] = customOptions[key] || [];
      if (!slotOptions(day, si).includes(name)) customOptions[key].push(name);
      saveCustom();
      selection[day] = selection[day] || {};
      selection[day][si] = name;
      saveSelection();
    }
  } else {
    selection[day] = selection[day] || {};
    selection[day][si] = val;
    saveSelection();
  }
  renderExercises();
  loadForm();
}

function togglePicker() {
  pickerOpen = !pickerOpen;
  renderExercises();
  loadForm();
}

init();

function init() {
  setToday();
  loadFromLocalStorage();
  switchDay('A');
  loadFromGitHub();
  // GitHub読込後にもdraftを適用するため、loadFromGitHub内でも呼ぶ
}

function setToday() {
  const d = new Date();
  document.getElementById('date-input').value =
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function switchDay(day) {
  currentDay = day;
  ['A','B','C'].forEach(d => {
    const t = document.getElementById(`tab-${d}`);
    t.className = `day-tab${d === day ? ` active-${d}` : ''}`;
  });
  document.getElementById('save-btn').className = `save-btn save-${day}`;
  renderExercises();
  loadForm();
  renderHistory();
  renderVolume();
  renderWeekCounter();
}

let currentView = 'log';
function showView(view) {
  currentView = view;
  document.getElementById('view-log').style.display = view === 'log' ? 'block' : 'none';
  document.getElementById('view-history').style.display = view === 'history' ? 'block' : 'none';
  document.getElementById('vtab-log').className = 'tab-btn' + (view === 'log' ? ' active' : '');
  document.getElementById('vtab-history').className = 'tab-btn' + (view === 'history' ? ' active' : '');
  if (view === 'history') { renderHistory(); renderVolume(); }
}

// Set1のrep・チート・RIRを全セットにコピー（入力時短）
function copySetsDown(name) {
  const r1 = document.getElementById(`${name}-set1`).value;
  const c1 = document.getElementById(`${name}-set1-cheat`).value;
  const rir1 = document.getElementById(`${name}-set1-rir`).value;
  [2,3,4].forEach(s => {
    document.getElementById(`${name}-set${s}`).value = r1;
    document.getElementById(`${name}-set${s}-cheat`).value = c1;
    document.getElementById(`${name}-set${s}-rir`).value = rir1;
  });
  scheduleDraftSave();
}

// 種目の重量推移スパークライン（その日の過去記録から最大8回分）
function renderTrend(name) {
  const pts = [];
  for (let i = 0; i < records.length; i++) {
    if (records[i].day !== currentDay) continue;
    const ex = records[i].exercises.find(e => e.name === name);
    if (ex && ex.weight > 0) pts.push({ date: records[i].date, w: ex.weight });
  }
  if (pts.length < 2) return '';
  const data = pts.slice(-8);
  const ws = data.map(p => p.w);
  const min = Math.min(...ws), max = Math.max(...ws);
  const W = 260, H = 34, pad = 4;
  const span = (max - min) || 1;
  const xy = data.map((p, i) => {
    const x = pad + (W - pad * 2) * (data.length === 1 ? 0.5 : i / (data.length - 1));
    const y = H - pad - (H - pad * 2) * (p.w - min) / span;
    return [x, y];
  });
  const line = xy.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const dots = xy.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#34a89a"/>`).join('');
  const last = data[data.length - 1].w, first = data[0].w;
  const diff = last - first;
  const trendTxt = diff > 0 ? `▲+${(Math.round(diff*10)/10)}kg` : diff < 0 ? `▼${(Math.round(diff*10)/10)}kg` : '→ 横ばい';
  const trendCol = diff > 0 ? '#2ecc71' : diff < 0 ? '#e07b6b' : '#888';
  return `
    <div class="trend-box">
      <div class="trend-head"><span>推移（直近${data.length}回）</span><span style="color:${trendCol};font-weight:700">${trendTxt}</span></div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
        <path d="${line}" fill="none" stroke="#34a89a" stroke-width="1.5"/>${dots}
      </svg>
      <div class="trend-foot"><span>${min}kg</span><span>${max}kg</span></div>
    </div>`;
}

// 次にやるDayの提案（直近の記録の逆を提案。Push/Pull交互）
function renderDaySuggest() {
  const el = document.getElementById('day-suggest');
  if (!el) return;
  let last = null;
  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].day === 'A' || records[i].day === 'B') { last = records[i]; break; }
  }
  if (!last) { el.innerHTML = ''; return; }
  const next = last.day === 'A' ? 'B' : 'A';
  const nextName = next === 'A' ? 'Push' : 'Pull';
  const lastName = last.day === 'A' ? 'Push' : 'Pull';
  el.innerHTML = `前回は ${lastName}（${fmt(last.date)}）→ 今日は <b>${nextName}（Day ${next}）</b> がおすすめ`;
  el.onclick = () => switchDay(next);
}

function renderWeekCounter() {
  const el = document.getElementById('week-counter');
  if (!el) return;
  const TARGET = 4;
  const today = new Date(); today.setHours(0,0,0,0);
  // 月曜始まりの今週（月〜日）
  const offsetToMonday = (today.getDay() + 6) % 7; // 月=0..日=6
  const monday = new Date(today); monday.setDate(today.getDate() - offsetToMonday);
  // 今週のセッション数（date+day の記録ごとに1回。Day A+Day Bを同日でも2回）
  const n = records.filter(r => {
    const d = new Date(r.date + 'T00:00:00');
    return d >= monday && d <= today;
  }).length;
  const hit = n >= TARGET;
  const dots = Array.from({length: TARGET}, (_, i) => `<div class="wc-dot${i < n ? ' on' : ''}"></div>`).join('');
  const extra = n > TARGET ? ` <span style="color:#2ecc71">+${n - TARGET}</span>` : '';
  el.innerHTML = `
    <div class="wc-top">
      <span class="wc-title">今週のトレ（月〜日）</span>
      <span class="wc-count ${hit ? 'hit' : 'miss'}">${n}/${TARGET}回${hit ? ' ✓' : ''}${extra}</span>
    </div>
    <div class="wc-dots">${dots}</div>`;
  renderDaySuggest();
}

// --- 下書き自動保存（誤閉じ対策） ---
let draftTimer = null;

function scheduleDraftSave() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(saveDraft, 600);
}

function saveDraft() {
  const date = document.getElementById('date-input').value;
  if (!date) return;
  const draft = {
    day: currentDay,
    date,
    exercises: activeExercises(currentDay).map(name => ({
      name,
      weight: document.getElementById(`${name}-weight`).value,
      sets: [1,2,3,4].map(s => document.getElementById(`${name}-set${s}`).value),
      cheating: [1,2,3,4].map(s => document.getElementById(`${name}-set${s}-cheat`).value),
      rirs: [1,2,3,4].map(s => document.getElementById(`${name}-set${s}-rir`).value)
    }))
  };
  localStorage.setItem('gym_draft', JSON.stringify(draft));
}

// フォーム復元：未保存の下書きを優先、無ければ保存済み記録を読み込む（再保存での消失を防ぐ）
function loadForm() {
  if (!loadDraft()) loadSavedRecord();
}

function loadDraft() {
  const s = localStorage.getItem('gym_draft');
  if (!s) return false;
  try {
    const draft = JSON.parse(s);
    if (draft.day !== currentDay) return false;
    const date = document.getElementById('date-input').value;
    if (draft.date !== date) return false;
    draft.exercises.forEach(ex => {
      const wEl = document.getElementById(`${ex.name}-weight`);
      if (wEl) wEl.value = ex.weight;
      ex.sets.forEach((v, i) => {
        const el = document.getElementById(`${ex.name}-set${i+1}`);
        if (el) el.value = v;
      });
      ex.cheating.forEach((v, i) => {
        const el = document.getElementById(`${ex.name}-set${i+1}-cheat`);
        if (el && v) el.value = v;
      });
      (ex.rirs || []).forEach((v, i) => {
        const el = document.getElementById(`${ex.name}-set${i+1}-rir`);
        if (el && v !== undefined && v !== '') el.value = v;
      });
    });
    return true;
  } catch(e) { return false; }
}

// 現在の日付・Dayに保存済み記録があればフォームへ反映（上書き消失の防止）
function loadSavedRecord() {
  const date = document.getElementById('date-input').value;
  const rec = records.find(r => r.date === date && r.day === currentDay);
  if (!rec) return false;
  rec.exercises.forEach(ex => {
    const wEl = document.getElementById(`${ex.name}-weight`);
    if (wEl && ex.weight) wEl.value = ex.weight;
    (ex.sets || []).forEach((v, i) => {
      const el = document.getElementById(`${ex.name}-set${i+1}`);
      if (el && v > 0) el.value = v;
    });
    (ex.cheating || []).forEach((v, i) => {
      const el = document.getElementById(`${ex.name}-set${i+1}-cheat`);
      if (el && v) el.value = v;
    });
    (ex.rirs || []).forEach((v, i) => {
      const el = document.getElementById(`${ex.name}-set${i+1}-rir`);
      if (el && typeof v === 'number') el.value = v;
    });
  });
  return true;
}

function clearDraft() {
  localStorage.removeItem('gym_draft');
}

function getPrev(name) {
  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].day !== currentDay) continue;
    const ex = records[i].exercises.find(e => e.name === name);
    if (ex) return { weight: ex.weight, date: records[i].date };
  }
  return null;
}

function getRecommendation(name) {
  // ダブルプログレッション × RIR（限界までの距離）
  // 筋肥大の最大駆動因子は「限界への近さ(RIR)」。rep数だけでなくRIRで判定する。
  // 目標: 8-12repを RIR 0-2（あと0〜2回が限界）で。全セット上限到達かつ余裕ありなら重量アップ。
  const ZONE_MIN = 8;
  const ZONE_MAX = 12;

  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].day !== currentDay) continue;
    const ex = records[i].exercises.find(e => e.name === name);
    if (!ex) continue;
    const activeSets = ex.sets.filter(s => s > 0);
    if (!activeSets.length) continue;

    const weight = ex.weight || 0;
    const minReps = Math.min(...activeSets);
    const setCount = activeSets.length;
    const inc = weight < 20 ? 1 : 2.5; // 約5%刻み
    // RIR: セット別なら最後の有効セットの値（最も疲労＝追い込み度）。旧データは単一rirにフォールバック
    let rir = null;
    if (Array.isArray(ex.rirs)) {
      for (let s = ex.sets.length - 1; s >= 0; s--) {
        if (ex.sets[s] > 0 && typeof ex.rirs[s] === 'number') { rir = ex.rirs[s]; break; }
      }
    } else if (typeof ex.rir === 'number') {
      rir = ex.rir;
    }
    // チート開始rep（最も早く崩れたセット）→ フォーム破綻の早さ
    const cheatStarts = (ex.cheating || []).filter(c => typeof c === 'number' && c > 0);
    const earliestCheat = cheatStarts.length ? Math.min(...cheatStarts) : null;
    const formBreaking = earliestCheat !== null && earliestCheat <= Math.ceil(minReps * 0.6);

    let recWeight, targetReps, note;

    if (minReps >= ZONE_MAX) {
      // 全セット上限到達 → 重量アップ。RIRに余裕があれば確信度UP
      recWeight = weight + inc;
      targetReps = `${ZONE_MIN}`;
      note = (rir !== null && rir >= 2) ? '重量アップ ▲（まだ余裕あり）' : '重量アップ ▲';
    } else if (minReps >= ZONE_MIN) {
      // ゾーン内（8-11rep）
      if (rir !== null && rir >= 4) {
        // 余裕を残しすぎ＝刺激不足。追い込みを優先
        recWeight = weight;
        targetReps = `${ZONE_MAX}`;
        note = 'あと1-2repまで追い込む';
      } else {
        recWeight = weight;
        targetReps = `${ZONE_MAX}`;
        note = '全セット12rep目標';
      }
    } else if (minReps >= 6) {
      // 6-7rep
      if (rir !== null && rir >= 3) {
        // repは低いが余力あり＝早く止めすぎ。同重量で追い込む
        recWeight = weight;
        targetReps = `${ZONE_MIN}-${ZONE_MAX}`;
        note = '止めが早い。あと数repいける';
      } else {
        recWeight = weight;
        targetReps = `${ZONE_MIN}-${ZONE_MAX}`;
        note = 'フォーム安定優先';
      }
    } else {
      // 5rep以下＝重量過多
      recWeight = Math.max(0, weight - inc);
      targetReps = `${ZONE_MIN}-${ZONE_MAX}`;
      note = '重量を下げる ▼';
    }

    // フォーム破綻が早い場合、重量アップは保留してフォーム優先
    if (formBreaking && recWeight > weight) {
      recWeight = weight;
      note = 'フォーム崩れ早め→重量据え置き';
    }

    return { weight: recWeight, reps: targetReps, sets: recSetsFor(name), note };
  }
  return null;
}

function renderPicker() {
  const day = currentDay;
  const rows = MENU[day].slots.map((slot, si) => {
    const chosen = chosenFor(day, si);
    const opts = slotOptions(day, si).map(o =>
      `<option value="${o}"${o === chosen ? ' selected' : ''}>${o}</option>`).join('');
    const skipSel = chosen === SKIP ? ' selected' : '';
    return `
      <div class="slot-row">
        <span class="slot-name">${slot.slot}</span>
        <select class="slot-select" onchange="onSlotChange('${day}',${si},this.value)">
          ${opts}
          <option value="${SKIP}"${skipSel}>― やらない</option>
          <option value="${ADD}">＋ 自分で追加</option>
        </select>
      </div>`;
  }).join('');
  const count = activeExercises(day).length;
  return `
    <div class="slot-picker">
      <div class="slot-picker-head" onclick="togglePicker()">
        <span>🎯 今日の種目を選ぶ（${count}種目）</span>
        <span>${pickerOpen ? '▲' : '▼'}</span>
      </div>
      <div class="slot-list" style="display:${pickerOpen ? 'block' : 'none'}">${rows}</div>
    </div>`;
}

function renderExercises() {
  const container = document.getElementById('exercise-cards');
  const cards = activeExercises(currentDay).map(name => {
    const prev = getPrev(name);
    const prevHTML = prev
      ? `<div class="prev-box">
           <div class="prev-label">前回</div>
           <div class="prev-val has-data">${prev.weight}kg</div>
           <div class="prev-date">${fmt(prev.date)}</div>
         </div>`
      : `<div class="prev-box"><div class="prev-val">初回</div></div>`;

    const prevWeight = prev ? prev.weight : '';

    const rOpts = REPS.map(r => `<option value="${r}">${r}</option>`).join('');

    const rirOpts = '<option value="">-</option>' + [0,1,2,3,4].map(v => `<option value="${v}">${v === 4 ? '4+' : v}</option>`).join('');
    const sets = [1,2,3,4].map(s => `
      <div class="set-col">
        <div class="set-label">Set${s}</div>
        <select id="${name}-set${s}" oninput="scheduleDraftSave()">${rOpts}</select>
        <div class="cheat-label">チート</div>
        <input type="number" inputmode="numeric" min="1" max="20"
          class="cheat-input" id="${name}-set${s}-cheat"
          placeholder="--" oninput="scheduleDraftSave()">
        <div class="cheat-label">RIR</div>
        <select class="rir-select" id="${name}-set${s}-rir" oninput="scheduleDraftSave()">${rirOpts}</select>
      </div>`).join('');

    const trendHTML = renderTrend(name);
    const rec = getRecommendation(name);
    const recHTML = rec
      ? `<div class="rec-bar">
           <span class="rec-label">次回</span>
           <span class="rec-val">${rec.weight}kg × ${rec.reps}rep × ${rec.sets}set</span>
           <span class="rec-note">${rec.note}</span>
         </div>`
      : '';

    return `
      <div class="exercise-card">
        <div class="exercise-header">
          <div class="exercise-name">${name}</div>
          ${prevHTML}
        </div>
        ${recHTML}
        ${trendHTML}
        <div class="weight-row">
          <div class="weight-label">重量</div>
          <input type="number" inputmode="decimal" step="0.5" min="0"
            class="weight-input" id="${name}-weight"
            value="${prevWeight}" placeholder="kg" oninput="scheduleDraftSave()">
        </div>
        <div class="sets-grid">${sets}</div>
        <div class="card-tools">
          <button type="button" class="mini-btn" onclick="copySetsDown('${name}')">⤵ Set1を全セットに反映</button>
        </div>
        <div class="rir-hint">RIR = 限界まであと何回（0＝限界・追い込めた / 3以上＝余裕あり）</div>
      </div>`;
  }).join('');
  const emptyMsg = activeExercises(currentDay).length === 0
    ? '<div class="empty">種目が選ばれていません。上の「種目を選ぶ」から選択してください。</div>'
    : '';
  container.innerHTML = renderPicker() + cards + emptyMsg;
}

async function saveRecord() {
  const date = document.getElementById('date-input').value;
  if (!date) { showToast('日付を入力してください'); return; }

  const exercises = activeExercises(currentDay).map(name => ({
    name,
    weight: parseFloat(document.getElementById(`${name}-weight`).value) || 0,
    sets: [1,2,3,4].map(s => parseInt(document.getElementById(`${name}-set${s}`).value)),
    cheating: [1,2,3,4].map(s => {
      const v = document.getElementById(`${name}-set${s}-cheat`).value;
      return v ? parseInt(v) : null;
    }),
    rirs: [1,2,3,4].map(s => {
      const v = document.getElementById(`${name}-set${s}-rir`).value;
      return v === '' ? null : parseInt(v);
    })
  }));

  const idx = records.findIndex(r => r.date === date && r.day === currentDay);
  if (idx >= 0) records[idx] = { date, day: currentDay, exercises };
  else records.push({ date, day: currentDay, exercises });

  records.sort((a,b) => a.date.localeCompare(b.date));
  clearDraft();
  await saveToGitHub();
  renderExercises();
  loadForm();
  renderHistory();
  renderVolume();
  renderWeekCounter();
  showToast('✅ 保存しました');
}

function renderHistory() {
  const list = records.filter(r => r.day === currentDay).slice().reverse();
  const el = document.getElementById('history-list');
  if (!list.length) { el.innerHTML = '<div class="empty">まだ記録がありません</div>'; return; }

  el.innerHTML = list.map(r => `
    <div class="history-card">
      <div class="history-date-bar day-${r.day}">
        <span>Day ${r.day} — ${fmt(r.date)}</span>
        <button onclick="deleteRecord('${r.date}','${r.day}')" style="background:none;border:none;color:#666;font-size:16px;cursor:pointer;padding:0 4px;">🗑️</button>
      </div>
      ${r.exercises.map(ex => `
        <div class="history-row">
          <div class="h-name">${ex.name}</div>
          <div class="h-weight">${ex.weight}kg</div>
          <div class="h-sets">${ex.sets.map((r, i) => {
            const cheat = ex.cheating && ex.cheating[i];
            const rv = Array.isArray(ex.rirs) ? ex.rirs[i] : (i === 0 && typeof ex.rir === 'number' ? ex.rir : null);
            let cell = String(r);
            if (cheat) cell += `(チ:${cheat}〜)`;
            if (typeof rv === 'number') cell += `<span style="color:#5a8">[R${rv === 4 ? '4+' : rv}]</span>`;
            return cell;
          }).join(', ')}回</div>
        </div>`).join('')}
    </div>`).join('');
}

function fmt(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// GitHub sync
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
const GITHUB_REPO = 'yanashin123-byte/gym-tracker';
const RECORDS_FILE = 'records.json';
let recordsSHA = null;
let pendingSync = false;

// アプリ復帰時に自動同期
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && pendingSync && GITHUB_TOKEN) {
    loadFromGitHub();
  }
});

async function loadFromGitHub() {
  if (!GITHUB_TOKEN) {
    loadFromLocalStorage();
    showSyncStatus('🔑 トークン未設定');
    return;
  }
  try {
    showSyncStatus('⏳ 読込中...');
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (res.ok) {
      const data = await res.json();
      recordsSHA = data.sha;
      const decoded = JSON.parse(fromBase64UTF8(data.content));
      const githubRecords = decoded.records || [];

      // ローカルのレコードを取得（上書き前に保存）
      const localStr = localStorage.getItem('gym_records');
      const localRecords = localStr ? JSON.parse(localStr) : [];

      // マージ: GitHub + ローカル（date+dayをキーに重複排除、両方残す）
      const merged = new Map();
      // まずGitHubのデータを入れる（ベース）
      githubRecords.forEach(r => merged.set(`${r.date}-${r.day}`, r));
      // ローカルにしかないレコードを追加（GitHubにないものだけ）
      localRecords.forEach(r => {
        const key = `${r.date}-${r.day}`;
        if (!merged.has(key)) merged.set(key, r);
      });

      records = Array.from(merged.values()).sort((a, b) => a.date.localeCompare(b.date));
      saveToLocalStorage();

      // マージ結果をGitHubに書き戻す（全デバイスで統一）
      await saveToGitHub();

      renderExercises();
      loadForm();
      renderHistory();
  renderVolume();
      renderWeekCounter();
      showSyncStatus('✅ 同期済み');
    } else if (res.status === 404) {
      // ファイルがまだない → ローカルから読んでそのまま使う
      loadFromLocalStorage();
      showSyncStatus('📱 ローカル（新規）');
    } else if (res.status === 401) {
      loadFromLocalStorage();
      showSyncStatus('🔑 トークンエラー');
    } else {
      loadFromLocalStorage();
      showSyncStatus('⚠️ 読込失敗');
    }
  } catch(e) {
    loadFromLocalStorage();
    showSyncStatus('📵 オフライン');
  }
}

function toBase64UTF8(str) {
  const bytes = new TextEncoder().encode(str);
  return btoa(Array.from(bytes).map(b => String.fromCharCode(b)).join(''));
}

function fromBase64UTF8(b64) {
  const binaryStr = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(binaryStr.split('').map(c => c.charCodeAt(0)));
  return new TextDecoder().decode(bytes);
}

async function fetchSHA() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (res.ok) {
      const data = await res.json();
      recordsSHA = data.sha;
    }
  } catch(e) {}
}

async function saveToGitHub() {
  saveToLocalStorage();
  if (!GITHUB_TOKEN) {
    showSyncStatus('🔑 トークン未設定');
    pendingSync = true;
    return;
  }

  // SHAが未取得の場合は先にフェッチ（SHA無しでPUTすると422エラーになる）
  if (!recordsSHA) await fetchSHA();

  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      showSyncStatus(attempt > 1 ? `⏳ 再試行中... (${attempt}/3)` : '⏳ 保存中...');
      const content = toBase64UTF8(JSON.stringify({ records }, null, 2));
      const body = { message: `Update records ${new Date().toISOString()}`, content };
      if (recordsSHA) body.sha = recordsSHA;

      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        const data = await res.json();
        recordsSHA = data.content.sha;
        showSyncStatus('✅ 同期済み');
        pendingSync = false;
        return;
      } else if (res.status === 409) {
        // SHA競合 → 再取得してリトライ
        await fetchSHA();
        continue;
      } else if (res.status === 401) {
        showSyncStatus('🔑 トークンエラー');
        pendingSync = true;
        return;
      } else {
        if (attempt < 3) {
          await new Promise(r => setTimeout(r, 2000 * attempt));
          continue;
        }
        showSyncStatus('⚠️ 同期失敗');
        pendingSync = true;
        return;
      }
    } catch(e) {
      if (attempt < 3) {
        await new Promise(r => setTimeout(r, 2000 * attempt));
        continue;
      }
      showSyncStatus('📵 オフライン保存');
      pendingSync = true;
      return;
    }
  }
}

function openSettings() {
  const input = document.getElementById('token-input');
  input.value = '';
  input.placeholder = GITHUB_TOKEN ? '（設定済み — 変更する場合は新しいトークンを入力）' : 'github_pat_...';
  const status = document.getElementById('token-status');
  status.textContent = GITHUB_TOKEN ? '✅ トークン設定済み' : '⚠️ トークン未設定';
  status.style.color = GITHUB_TOKEN ? '#6aff6a' : '#f0a040';
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function saveToken() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) { showToast('トークンを入力してください'); return; }
  GITHUB_TOKEN = val;
  localStorage.setItem('github_token', val);
  closeSettings();
  showToast('✅ トークンを保存しました');
  loadFromGitHub();
}

function clearToken() {
  if (!confirm('トークンを削除しますか？')) return;
  GITHUB_TOKEN = '';
  localStorage.removeItem('github_token');
  closeSettings();
  showSyncStatus('🔑 トークン未設定');
  showToast('🗑️ トークンを削除しました');
}

function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

function deleteRecord(date, day) {
  if (!confirm(`${fmt(date)} Day ${day} の記録を削除しますか？`)) return;
  records = records.filter(r => !(r.date === date && r.day === day));
  saveToGitHub();
  renderExercises();
  renderHistory();
  renderVolume();
  renderWeekCounter();
  showToast('🗑️ 削除しました');
}

function saveToLocalStorage() {
  localStorage.setItem('gym_records', JSON.stringify(records));
}

function loadFromLocalStorage() {
  const s = localStorage.getItem('gym_records');
  if (s) records = JSON.parse(s);
}

function getJSON() {
  return JSON.stringify({ records }, null, 2);
}

function showJSON() {
  document.getElementById('modal-title').textContent = 'JSONデータ（コピーしてClaudeに渡す）';
  document.getElementById('modal-text').value = getJSON();
  document.getElementById('json-modal').classList.add('open');
}

function copyJSON() {
  const text = document.getElementById('modal-text').value;
  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 コピーしました');
    closeModal();
  }).catch(() => {
    document.getElementById('modal-text').select();
    showToast('手動でコピーしてください');
  });
}

function showImport() {
  document.getElementById('modal-title').textContent = 'JSONを貼り付けて読込';
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-text').removeAttribute('readonly');
  document.getElementById('json-modal').classList.add('open');

  // ボタンを「読込」に変更
  const btns = document.querySelector('.modal-btns');
  btns.innerHTML = `
    <button class="modal-btn modal-copy" onclick="importJSON()">読込</button>
    <button class="modal-btn modal-close" onclick="closeModal(); document.getElementById('modal-text').setAttribute('readonly','');">閉じる</button>`;
}

function importJSON() {
  try {
    const data = JSON.parse(document.getElementById('modal-text').value);
    records = data.records || [];
    saveToLocalStorage();
    renderExercises();
    renderHistory();
  renderVolume();
    renderWeekCounter();
    closeModal();
    showToast('✅ 読込完了');
    document.getElementById('modal-text').setAttribute('readonly', '');
  } catch(e) {
    showToast('❌ JSONが正しくありません');
  }
}

function closeModal() {
  document.getElementById('json-modal').classList.remove('open');
  const btns = document.querySelector('.modal-btns');
  btns.innerHTML = `
    <button class="modal-btn modal-copy" onclick="copyJSON()">コピー</button>
    <button class="modal-btn modal-close" onclick="closeModal()">閉じる</button>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
