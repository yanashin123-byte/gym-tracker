<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>筋トレ記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: #1a1a1a;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  header h1 { font-size: 18px; font-weight: 700; }

  .header-btns { display: flex; gap: 8px; }

  .icon-btn {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: #aaa;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  .day-tabs {
    display: flex;
    gap: 8px;
  }

  .day-tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #2a2a2a;
    color: #666;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .day-tab.active-A { background: #dc5050; color: #fff; }
  .day-tab.active-B { background: #34a89a; color: #fff; }
  .day-tab.active-C { background: #4285f4; color: #fff; }

  .date-bar {
    padding: 10px 20px;
    background: #161616;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #222;
  }

  .date-bar label { color: #666; font-size: 12px; white-space: nowrap; }

  .date-bar input[type="date"] {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    color: #eee;
    padding: 7px 10px;
    font-size: 15px;
    flex: 1;
  }

  .today-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    color: #aaa;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  .section-wrap { padding: 14px 20px; }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .exercise-card {
    background: #1e1e1e;
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }

  /* 種目選択パネル */
  .slot-picker {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .slot-picker-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #ccc;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .slot-list { padding: 0 14px 10px; }
  .slot-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px solid #222;
  }
  .slot-name {
    font-size: 12px;
    color: #888;
    width: 84px;
    flex-shrink: 0;
  }
  .slot-select {
    flex: 1;
    min-width: 0;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #eee;
    padding: 9px 10px;
    font-size: 13px;
  }

  .exercise-header {
    padding: 12px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .exercise-name { font-weight: 700; font-size: 15px; }

  .prev-box { text-align: right; }

  .prev-label { font-size: 10px; color: #555; margin-bottom: 2px; }

  .prev-val { font-size: 13px; font-weight: 700; color: #555; }
  .prev-val.has-data { color: #f0c040; }

  .prev-date { font-size: 10px; color: #444; }

  .rec-bar {
    margin: 0 14px 10px;
    padding: 7px 10px;
    background: #0d2420;
    border: 1px solid #1a3a30;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .rec-label { color: #34a89a; font-weight: 700; white-space: nowrap; }
  .rec-val { color: #7dd8c8; font-weight: 700; }
  .rec-note { color: #3a6a60; font-size: 11px; margin-left: auto; }

  .weight-row {
    padding: 0 14px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weight-label { font-size: 11px; color: #555; white-space: nowrap; }

  select {
    background: #2a2a2a;
    border: 1px solid #383838;
    border-radius: 8px;
    color: #eee;
    padding: 8px 6px;
    font-size: 15px;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }

  .sets-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 0 14px 12px;
  }

  .set-col { display: flex; flex-direction: column; gap: 4px; }
  .set-label { font-size: 10px; color: #555; text-align: center; font-weight: 600; }

  .weight-input {
    background: #2a2a2a;
    border: 1px solid #383838;
    border-radius: 8px;
    color: #eee;
    padding: 8px 10px;
    font-size: 18px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }
  .weight-input::-webkit-outer-spin-button,
  .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .weight-input::placeholder { color: #444; }

  .cheat-input {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #f0a040;
    padding: 4px;
    font-size: 12px;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }
  .cheat-input::-webkit-outer-spin-button,
  .cheat-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .cheat-input::placeholder { color: #333; font-size: 10px; }
  .cheat-label { font-size: 9px; color: #444; text-align: center; }

  .save-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 4px 20px 0;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:active { opacity: 0.75; }
  .save-A { background: #dc5050; color: #fff; }
  .save-B { background: #34a89a; color: #fff; }
  .save-C { background: #4285f4; color: #fff; }

  .export-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px 0;
  }

  .export-btn {
    flex: 1;
    padding: 11px;
    border: 1px solid #333;
    border-radius: 10px;
    background: #1e1e1e;
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  .export-btn:active { background: #2a2a2a; }

  .divider { height: 1px; background: #1e1e1e; margin: 16px 0 0; }

  .history-card {
    background: #1a1a1a;
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 1px solid #222;
  }

  .history-date-bar {
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
  }

  .history-date-bar.day-A { background: #2a1010; color: #dc5050; }
  .history-date-bar.day-B { background: #0a2420; color: #34a89a; }
  .history-date-bar.day-C { background: #0a1828; color: #4285f4; }

  .history-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    border-top: 1px solid #1e1e1e;
    gap: 8px;
  }

  .h-name { flex: 1; font-size: 12px; color: #bbb; }
  .h-weight { font-size: 13px; font-weight: 700; color: #eee; min-width: 55px; text-align: right; }
  .h-sets { font-size: 11px; color: #555; text-align: right; }

  .empty { color: #444; font-size: 14px; text-align: center; padding: 36px 0; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a2a2a;
    border: 1px solid #444;
    color: #eee;
    padding: 11px 22px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #1e1e1e;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 70vh;
  }

  .modal h3 { font-size: 15px; margin-bottom: 12px; color: #eee; }

  .modal textarea {
    width: 100%;
    height: 180px;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    color: #6aff6a;
    font-family: monospace;
    font-size: 12px;
    padding: 12px;
    resize: none;
  }

  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .modal-copy { background: #4285f4; color: #fff; }
  .modal-close { background: #2a2a2a; color: #aaa; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>💪 筋トレ記録</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="sync-status" style="font-size:12px;color:#666;">⏳ 読込中...</span>
      <button class="icon-btn" onclick="loadFromGitHub()">🔄</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="day-tabs">
    <button class="day-tab" id="tab-A" onclick="switchDay('A')">Day A<br>Push</button>
    <button class="day-tab" id="tab-B" onclick="switchDay('B')">Day B<br>Pull</button>
    <button class="day-tab" id="tab-C" onclick="switchDay('C')">Day C<br>Legs</button>
  </div>
</header>

<div class="date-bar">
  <label>日付</label>
  <input type="date" id="date-input">
  <button class="today-btn" onclick="setToday()">今日</button>
</div>

<div class="section-wrap">
  <div class="section-title">今日の記録</div>
  <div id="exercise-cards"></div>
</div>

<button class="save-btn save-A" id="save-btn" onclick="saveRecord()">✅ 保存</button>


<div class="divider"></div>

<div class="section-wrap">
  <div class="section-title">過去の記録</div>
  <div id="history-list"></div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>⚙️ GitHub設定</h3>
    <p style="font-size:12px;color:#666;margin-bottom:12px;">GitHub Fine-grained PATを入力してください。<br>このデバイスのみに保存されます。</p>
    <input type="password" id="token-input"
      style="width:100%;background:#111;border:1px solid #333;border-radius:10px;color:#6aff6a;font-family:monospace;font-size:13px;padding:12px;margin-bottom:8px;"
      placeholder="github_pat_...">
    <div id="token-status" style="font-size:12px;color:#666;margin-bottom:12px;min-height:16px;"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-copy" onclick="saveToken()">保存</button>
      <button class="modal-btn" style="background:#5a1a1a;color:#f08080;" onclick="clearToken()">削除</button>
      <button class="modal-btn modal-close" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<!-- JSONモーダル -->
<div class="modal-overlay" id="json-modal">
  <div class="modal">
    <h3 id="modal-title">JSONデータ</h3>
    <textarea id="modal-text" readonly></textarea>
    <div class="modal-btns">
      <button class="modal-btn modal-copy" onclick="copyJSON()">コピー</button>
      <button class="modal-btn modal-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 種目プール（FITPLACE24綾瀬店の設備ベース）
// 各枠(slot)の先頭が初期選択。代替種目を枠内で選べる。
const MENU = {
  A: { name: 'Push', slots: [
    { slot: '胸 メイン',  options: ['ベンチプレス', 'スミスマシンベンチプレス', 'チェストプレス', 'インクラインチェストプレス', 'インクラインダンベルプレス', 'ダンベルプレス'] },
    { slot: '胸 補助',    options: ['ペックフライ', 'ケーブルフライ', 'ディップス'] },
    { slot: '肩 プレス',  options: ['ダンベルショルダープレス', 'ショルダープレスマシン', 'スミスマシンショルダープレス'] },
    { slot: '肩 サイド',  options: ['サイドレイズ', 'マシンサイドレイズ', 'ケーブルサイドレイズ'] },
    { slot: '三頭',       options: ['ケーブルプッシュダウン', 'スカルクラッシャー', 'ディップス'] },
  ]},
  B: { name: 'Pull', slots: [
    { slot: '背中 縦引き', options: ['ラットプルダウン', 'ワイドプルダウン', '懸垂'] },
    { slot: '背中 横引き', options: ['ローロウ', 'フロントロウ', 'ワンハンドダンベルロウ'] },
    { slot: '背中 補助',   options: ['プルオーバー', 'デッドリフト', 'ケーブルプルオーバー'] },
    { slot: '二頭',        options: ['ダンベルカール', 'インクラインダンベルカール', 'ケーブルカール', 'マシンアームカール'] },
    { slot: '後肩・僧帽',  options: ['リバースフライ', 'シュラッグ'] },
  ]},
  C: { name: 'Legs', slots: [
    { slot: '脚 メイン',  options: ['スクワット', 'ハックスクワット', 'レッグプレス', 'スミスマシンスクワット'] },
    { slot: '大腿四頭',   options: ['レッグエクステンション'] },
    { slot: 'ハム・尻',   options: ['レッグカール', 'ヒップスラスト'] },
    { slot: '内/外もも',  options: ['アダクション', 'アブダクション'] },
    { slot: 'カーフ・腹', options: ['カーフレイズ', 'アブドミナルクランチ', 'ロータリートーソー'] },
  ]},
};

const SKIP = '__skip__';
const ADD  = '__add__';

const REPS = Array.from({length: 21}, (_, i) => i);

let currentDay = 'A';
let records = [];

// 枠ごとの選択（{ A: {0:'ベンチプレス', 1:'__skip__', ...}, ... }）
let selection = JSON.parse(localStorage.getItem('gym_selection') || '{}');
// 自分で追加した種目（{ 'A:0': ['自作種目'] }）
let customOptions = JSON.parse(localStorage.getItem('gym_custom') || '{}');
// 種目選択パネルの開閉
let pickerOpen = false;

function saveSelection() { localStorage.setItem('gym_selection', JSON.stringify(selection)); }
function saveCustom() { localStorage.setItem('gym_custom', JSON.stringify(customOptions)); }

function slotOptions(day, si) {
  const base = MENU[day].slots[si].options;
  const cust = customOptions[`${day}:${si}`] || [];
  return [...base, ...cust];
}

function chosenFor(day, si) {
  const sel = selection[day] && selection[day][si];
  if (sel !== undefined) return sel;
  return MENU[day].slots[si].options[0]; // 初期選択＝先頭
}

// その日の有効な種目（選択済み・スキップ除外・重複除外）
function activeExercises(day) {
  const out = [];
  MENU[day].slots.forEach((_, si) => {
    const c = chosenFor(day, si);
    if (c && c !== SKIP && !out.includes(c)) out.push(c);
  });
  return out;
}

function onSlotChange(day, si, val) {
  if (val === ADD) {
    const name = (prompt('追加する種目名を入力') || '').trim();
    if (name) {
      const key = `${day}:${si}`;
      customOptions[key] = customOptions[key] || [];
      if (!slotOptions(day, si).includes(name)) customOptions[key].push(name);
      saveCustom();
      selection[day] = selection[day] || {};
      selection[day][si] = name;
      saveSelection();
    }
  } else {
    selection[day] = selection[day] || {};
    selection[day][si] = val;
    saveSelection();
  }
  renderExercises();
  loadDraft();
}

function togglePicker() {
  pickerOpen = !pickerOpen;
  renderExercises();
  loadDraft();
}

init();

function init() {
  setToday();
  loadFromLocalStorage();
  switchDay('A');
  loadFromGitHub();
  // GitHub読込後にもdraftを適用するため、loadFromGitHub内でも呼ぶ
}

function setToday() {
  const d = new Date();
  document.getElementById('date-input').value =
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function switchDay(day) {
  currentDay = day;
  ['A','B','C'].forEach(d => {
    const t = document.getElementById(`tab-${d}`);
    t.className = `day-tab${d === day ? ` active-${d}` : ''}`;
  });
  document.getElementById('save-btn').className = `save-btn save-${day}`;
  renderExercises();
  loadDraft();
  renderHistory();
}

// --- 下書き自動保存（誤閉じ対策） ---
let draftTimer = null;

function scheduleDraftSave() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(saveDraft, 600);
}

function saveDraft() {
  const date = document.getElementById('date-input').value;
  if (!date) return;
  const draft = {
    day: currentDay,
    date,
    exercises: activeExercises(currentDay).map(name => ({
      name,
      weight: document.getElementById(`${name}-weight`).value,
      sets: [1,2,3,4].map(s => document.getElementById(`${name}-set${s}`).value),
      cheating: [1,2,3,4].map(s => document.getElementById(`${name}-set${s}-cheat`).value)
    }))
  };
  localStorage.setItem('gym_draft', JSON.stringify(draft));
}

function loadDraft() {
  const s = localStorage.getItem('gym_draft');
  if (!s) return;
  try {
    const draft = JSON.parse(s);
    if (draft.day !== currentDay) return;
    const date = document.getElementById('date-input').value;
    if (draft.date !== date) return;
    draft.exercises.forEach(ex => {
      const wEl = document.getElementById(`${ex.name}-weight`);
      if (wEl) wEl.value = ex.weight;
      ex.sets.forEach((v, i) => {
        const el = document.getElementById(`${ex.name}-set${i+1}`);
        if (el) el.value = v;
      });
      ex.cheating.forEach((v, i) => {
        const el = document.getElementById(`${ex.name}-set${i+1}-cheat`);
        if (el && v) el.value = v;
      });
    });
  } catch(e) {}
}

function clearDraft() {
  localStorage.removeItem('gym_draft');
}

function getPrev(name) {
  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].day !== currentDay) continue;
    const ex = records[i].exercises.find(e => e.name === name);
    if (ex) return { weight: ex.weight, date: records[i].date };
  }
  return null;
}

function getRecommendation(name) {
  // ダブルプログレッション法（筋肥大エビデンスに基づく）
  // 目標ゾーン: 8-12rep（ACSM筋肥大ガイドライン）
  // 全セットが上限(12rep)に達したら約5%重量アップ → 下限(8rep)から再スタート
  const ZONE_MIN = 8;
  const ZONE_MAX = 12;

  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].day !== currentDay) continue;
    const ex = records[i].exercises.find(e => e.name === name);
    if (!ex) continue;
    const activeSets = ex.sets.filter(s => s > 0);
    if (!activeSets.length) continue;

    const weight = ex.weight || 0;
    const minReps = Math.min(...activeSets);
    const setCount = activeSets.length;
    const inc = weight < 20 ? 1 : 2.5; // 約5%刻み

    let recWeight, targetReps, note;

    if (minReps >= ZONE_MAX) {
      // 全セット12rep以上 → 重量アップのサイン（ダブルプログレッション）
      recWeight = weight + inc;
      targetReps = `${ZONE_MIN}`;
      note = '重量アップ ▲';
    } else if (minReps >= ZONE_MIN) {
      // ゾーン内（8-11rep）→ 同重量で全セット12repを目指す
      recWeight = weight;
      targetReps = `${ZONE_MAX}`;
      note = '全セット12rep目標';
    } else if (minReps >= 6) {
      // 下限割れ（6-7rep）→ 重量が少し重い。同重量でフォーム安定を優先
      recWeight = weight;
      targetReps = `${ZONE_MIN}-${ZONE_MAX}`;
      note = 'フォーム安定優先';
    } else {
      // 5rep以下 → 重量過多。軽くして正しい刺激を入れる
      recWeight = Math.max(0, weight - inc);
      targetReps = `${ZONE_MIN}-${ZONE_MAX}`;
      note = '重量を下げる ▼';
    }

    return { weight: recWeight, reps: targetReps, sets: setCount, note };
  }
  return null;
}

function renderPicker() {
  const day = currentDay;
  const rows = MENU[day].slots.map((slot, si) => {
    const chosen = chosenFor(day, si);
    const opts = slotOptions(day, si).map(o =>
      `<option value="${o}"${o === chosen ? ' selected' : ''}>${o}</option>`).join('');
    const skipSel = chosen === SKIP ? ' selected' : '';
    return `
      <div class="slot-row">
        <span class="slot-name">${slot.slot}</span>
        <select class="slot-select" onchange="onSlotChange('${day}',${si},this.value)">
          ${opts}
          <option value="${SKIP}"${skipSel}>― やらない</option>
          <option value="${ADD}">＋ 自分で追加</option>
        </select>
      </div>`;
  }).join('');
  const count = activeExercises(day).length;
  return `
    <div class="slot-picker">
      <div class="slot-picker-head" onclick="togglePicker()">
        <span>🎯 今日の種目を選ぶ（${count}種目）</span>
        <span>${pickerOpen ? '▲' : '▼'}</span>
      </div>
      <div class="slot-list" style="display:${pickerOpen ? 'block' : 'none'}">${rows}</div>
    </div>`;
}

function renderExercises() {
  const container = document.getElementById('exercise-cards');
  const cards = activeExercises(currentDay).map(name => {
    const prev = getPrev(name);
    const prevHTML = prev
      ? `<div class="prev-box">
           <div class="prev-label">前回</div>
           <div class="prev-val has-data">${prev.weight}kg</div>
           <div class="prev-date">${fmt(prev.date)}</div>
         </div>`
      : `<div class="prev-box"><div class="prev-val">初回</div></div>`;

    const prevWeight = prev ? prev.weight : '';

    const rOpts = REPS.map(r => `<option value="${r}">${r}</option>`).join('');

    const sets = [1,2,3,4].map(s => `
      <div class="set-col">
        <div class="set-label">Set${s}</div>
        <select id="${name}-set${s}" oninput="scheduleDraftSave()">${rOpts}</select>
        <div class="cheat-label">チート</div>
        <input type="number" inputmode="numeric" min="1" max="20"
          class="cheat-input" id="${name}-set${s}-cheat"
          placeholder="--" oninput="scheduleDraftSave()">
      </div>`).join('');

    const rec = getRecommendation(name);
    const recHTML = rec
      ? `<div class="rec-bar">
           <span class="rec-label">次回</span>
           <span class="rec-val">${rec.weight}kg × ${rec.reps}rep × ${rec.sets}set</span>
           <span class="rec-note">${rec.note}</span>
         </div>`
      : '';

    return `
      <div class="exercise-card">
        <div class="exercise-header">
          <div class="exercise-name">${name}</div>
          ${prevHTML}
        </div>
        ${recHTML}
        <div class="weight-row">
          <div class="weight-label">重量</div>
          <input type="number" inputmode="decimal" step="0.5" min="0"
            class="weight-input" id="${name}-weight"
            value="${prevWeight}" placeholder="kg" oninput="scheduleDraftSave()">
        </div>
        <div class="sets-grid">${sets}</div>
      </div>`;
  }).join('');
  const emptyMsg = activeExercises(currentDay).length === 0
    ? '<div class="empty">種目が選ばれていません。上の「種目を選ぶ」から選択してください。</div>'
    : '';
  container.innerHTML = renderPicker() + cards + emptyMsg;
}

async function saveRecord() {
  const date = document.getElementById('date-input').value;
  if (!date) { showToast('日付を入力してください'); return; }

  const exercises = activeExercises(currentDay).map(name => ({
    name,
    weight: parseFloat(document.getElementById(`${name}-weight`).value) || 0,
    sets: [1,2,3,4].map(s => parseInt(document.getElementById(`${name}-set${s}`).value)),
    cheating: [1,2,3,4].map(s => {
      const v = document.getElementById(`${name}-set${s}-cheat`).value;
      return v ? parseInt(v) : null;
    })
  }));

  const idx = records.findIndex(r => r.date === date && r.day === currentDay);
  if (idx >= 0) records[idx] = { date, day: currentDay, exercises };
  else records.push({ date, day: currentDay, exercises });

  records.sort((a,b) => a.date.localeCompare(b.date));
  clearDraft();
  await saveToGitHub();
  renderExercises();
  loadDraft();
  renderHistory();
  showToast('✅ 保存しました');
}

function renderHistory() {
  const list = records.filter(r => r.day === currentDay).slice().reverse();
  const el = document.getElementById('history-list');
  if (!list.length) { el.innerHTML = '<div class="empty">まだ記録がありません</div>'; return; }

  el.innerHTML = list.map(r => `
    <div class="history-card">
      <div class="history-date-bar day-${r.day}">
        <span>Day ${r.day} — ${fmt(r.date)}</span>
        <button onclick="deleteRecord('${r.date}','${r.day}')" style="background:none;border:none;color:#666;font-size:16px;cursor:pointer;padding:0 4px;">🗑️</button>
      </div>
      ${r.exercises.map(ex => `
        <div class="history-row">
          <div class="h-name">${ex.name}</div>
          <div class="h-weight">${ex.weight}kg</div>
          <div class="h-sets">${ex.sets.map((r, i) => {
            const cheat = ex.cheating && ex.cheating[i];
            return cheat ? `${r}(チ:${cheat}〜)` : r;
          }).join(', ')}回</div>
        </div>`).join('')}
    </div>`).join('');
}

function fmt(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// GitHub sync
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
const GITHUB_REPO = 'yanashin123-byte/gym-tracker';
const RECORDS_FILE = 'records.json';
let recordsSHA = null;
let pendingSync = false;

// アプリ復帰時に自動同期
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && pendingSync && GITHUB_TOKEN) {
    loadFromGitHub();
  }
});

async function loadFromGitHub() {
  if (!GITHUB_TOKEN) {
    loadFromLocalStorage();
    showSyncStatus('🔑 トークン未設定');
    return;
  }
  try {
    showSyncStatus('⏳ 読込中...');
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (res.ok) {
      const data = await res.json();
      recordsSHA = data.sha;
      const decoded = JSON.parse(fromBase64UTF8(data.content));
      const githubRecords = decoded.records || [];

      // ローカルのレコードを取得（上書き前に保存）
      const localStr = localStorage.getItem('gym_records');
      const localRecords = localStr ? JSON.parse(localStr) : [];

      // マージ: GitHub + ローカル（date+dayをキーに重複排除、両方残す）
      const merged = new Map();
      // まずGitHubのデータを入れる（ベース）
      githubRecords.forEach(r => merged.set(`${r.date}-${r.day}`, r));
      // ローカルにしかないレコードを追加（GitHubにないものだけ）
      localRecords.forEach(r => {
        const key = `${r.date}-${r.day}`;
        if (!merged.has(key)) merged.set(key, r);
      });

      records = Array.from(merged.values()).sort((a, b) => a.date.localeCompare(b.date));
      saveToLocalStorage();

      // マージ結果をGitHubに書き戻す（全デバイスで統一）
      await saveToGitHub();

      renderExercises();
      loadDraft();
      renderHistory();
      showSyncStatus('✅ 同期済み');
    } else if (res.status === 404) {
      // ファイルがまだない → ローカルから読んでそのまま使う
      loadFromLocalStorage();
      showSyncStatus('📱 ローカル（新規）');
    } else if (res.status === 401) {
      loadFromLocalStorage();
      showSyncStatus('🔑 トークンエラー');
    } else {
      loadFromLocalStorage();
      showSyncStatus('⚠️ 読込失敗');
    }
  } catch(e) {
    loadFromLocalStorage();
    showSyncStatus('📵 オフライン');
  }
}

function toBase64UTF8(str) {
  const bytes = new TextEncoder().encode(str);
  return btoa(Array.from(bytes).map(b => String.fromCharCode(b)).join(''));
}

function fromBase64UTF8(b64) {
  const binaryStr = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(binaryStr.split('').map(c => c.charCodeAt(0)));
  return new TextDecoder().decode(bytes);
}

async function fetchSHA() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (res.ok) {
      const data = await res.json();
      recordsSHA = data.sha;
    }
  } catch(e) {}
}

async function saveToGitHub() {
  saveToLocalStorage();
  if (!GITHUB_TOKEN) {
    showSyncStatus('🔑 トークン未設定');
    pendingSync = true;
    return;
  }

  // SHAが未取得の場合は先にフェッチ（SHA無しでPUTすると422エラーになる）
  if (!recordsSHA) await fetchSHA();

  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      showSyncStatus(attempt > 1 ? `⏳ 再試行中... (${attempt}/3)` : '⏳ 保存中...');
      const content = toBase64UTF8(JSON.stringify({ records }, null, 2));
      const body = { message: `Update records ${new Date().toISOString()}`, content };
      if (recordsSHA) body.sha = recordsSHA;

      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${RECORDS_FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        const data = await res.json();
        recordsSHA = data.content.sha;
        showSyncStatus('✅ 同期済み');
        pendingSync = false;
        return;
      } else if (res.status === 409) {
        // SHA競合 → 再取得してリトライ
        await fetchSHA();
        continue;
      } else if (res.status === 401) {
        showSyncStatus('🔑 トークンエラー');
        pendingSync = true;
        return;
      } else {
        if (attempt < 3) {
          await new Promise(r => setTimeout(r, 2000 * attempt));
          continue;
        }
        showSyncStatus('⚠️ 同期失敗');
        pendingSync = true;
        return;
      }
    } catch(e) {
      if (attempt < 3) {
        await new Promise(r => setTimeout(r, 2000 * attempt));
        continue;
      }
      showSyncStatus('📵 オフライン保存');
      pendingSync = true;
      return;
    }
  }
}

function openSettings() {
  const input = document.getElementById('token-input');
  input.value = '';
  input.placeholder = GITHUB_TOKEN ? '（設定済み — 変更する場合は新しいトークンを入力）' : 'github_pat_...';
  const status = document.getElementById('token-status');
  status.textContent = GITHUB_TOKEN ? '✅ トークン設定済み' : '⚠️ トークン未設定';
  status.style.color = GITHUB_TOKEN ? '#6aff6a' : '#f0a040';
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function saveToken() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) { showToast('トークンを入力してください'); return; }
  GITHUB_TOKEN = val;
  localStorage.setItem('github_token', val);
  closeSettings();
  showToast('✅ トークンを保存しました');
  loadFromGitHub();
}

function clearToken() {
  if (!confirm('トークンを削除しますか？')) return;
  GITHUB_TOKEN = '';
  localStorage.removeItem('github_token');
  closeSettings();
  showSyncStatus('🔑 トークン未設定');
  showToast('🗑️ トークンを削除しました');
}

function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

function deleteRecord(date, day) {
  if (!confirm(`${fmt(date)} Day ${day} の記録を削除しますか？`)) return;
  records = records.filter(r => !(r.date === date && r.day === day));
  saveToGitHub();
  renderExercises();
  renderHistory();
  showToast('🗑️ 削除しました');
}

function saveToLocalStorage() {
  localStorage.setItem('gym_records', JSON.stringify(records));
}

function loadFromLocalStorage() {
  const s = localStorage.getItem('gym_records');
  if (s) records = JSON.parse(s);
}

function getJSON() {
  return JSON.stringify({ records }, null, 2);
}

function showJSON() {
  document.getElementById('modal-title').textContent = 'JSONデータ（コピーしてClaudeに渡す）';
  document.getElementById('modal-text').value = getJSON();
  document.getElementById('json-modal').classList.add('open');
}

function copyJSON() {
  const text = document.getElementById('modal-text').value;
  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 コピーしました');
    closeModal();
  }).catch(() => {
    document.getElementById('modal-text').select();
    showToast('手動でコピーしてください');
  });
}

function showImport() {
  document.getElementById('modal-title').textContent = 'JSONを貼り付けて読込';
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-text').removeAttribute('readonly');
  document.getElementById('json-modal').classList.add('open');

  // ボタンを「読込」に変更
  const btns = document.querySelector('.modal-btns');
  btns.innerHTML = `
    <button class="modal-btn modal-copy" onclick="importJSON()">読込</button>
    <button class="modal-btn modal-close" onclick="closeModal(); document.getElementById('modal-text').setAttribute('readonly','');">閉じる</button>`;
}

function importJSON() {
  try {
    const data = JSON.parse(document.getElementById('modal-text').value);
    records = data.records || [];
    saveToLocalStorage();
    renderExercises();
    renderHistory();
    closeModal();
    showToast('✅ 読込完了');
    document.getElementById('modal-text').setAttribute('readonly', '');
  } catch(e) {
    showToast('❌ JSONが正しくありません');
  }
}

function closeModal() {
  document.getElementById('json-modal').classList.remove('open');
  const btns = document.querySelector('.modal-btns');
  btns.innerHTML = `
    <button class="modal-btn modal-copy" onclick="copyJSON()">コピー</button>
    <button class="modal-btn modal-close" onclick="closeModal()">閉じる</button>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
